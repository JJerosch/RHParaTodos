<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Departamentos')}"><title>Departamentos</title></head>

<body>
  <script th:inline="javascript">
    window.__CURRENT_USER__ = {
      email: /*[[${currentUser.email}]]*/ 'usuario@local',
      role:  /*[[${currentUser.role}]]*/ 'EMPLOYEE'
    };
  </script>

  <!-- Sidebar -->
  <aside th:replace="~{fragments/sidebar :: admin('departments')}"></aside>


  <!-- Main Content -->
  <div class="main-content">
    <header th:replace="~{fragments/topbar :: topbar('Departamentos')}"></header>

    <div class="content-area">
      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-box-header">
            <div class="stat-box-icon" style="background: rgba(44, 62, 80, 0.1); color: var(--primary-dark);"><img
                th:src="@{/assets/building-2.png}" alt="icone_departamentos"></div>
          </div>
          <div class="stat-box-value" id="statTotal">0</div>
          <div class="stat-box-label">Total de Departamentos</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-header">
            <div class="stat-box-icon" style="background: rgba(39, 174, 96, 0.1); color: var(--success-green);"><img
                th:src="@{/assets/check (1).png}" alt="icone_departamentos_ativos"></div>
          </div>
          <div class="stat-box-value" id="statAtivos">0</div>
          <div class="stat-box-label">Ativos</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-header">
            <div class="stat-box-icon" style="background: rgba(243, 156, 18, 0.1); color: var(--warning-orange);"><img
                th:src="@{/assets/users (1).png}" alt="icone_total_funcionarios"></div>
          </div>
          <div class="stat-box-value" id="statFuncionarios">0</div>
          <div class="stat-box-label">Total de Funcionários</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-header">
            <div class="stat-box-icon" style="background: rgba(93, 109, 126, 0.1); color: var(--info-gray);"><img
                th:src="@{/assets/scale.png}" alt="icone_media_departamento"></div>
          </div>
          <div class="stat-box-value" id="statMedia">0</div>
          <div class="stat-box-label">Média por Departamento</div>
        </div>
      </div>

      <!-- Page Header -->
      <div class="page-header">
        <div>
          <h2 class="page-title">Estrutura Organizacional</h2>
          <p class="page-subtitle">Gerencie os departamentos da empresa</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openDepartmentModal()">+ Novo Departamento</button>
        </div>
      </div>

      <!-- Departments Grid -->
      <div class="departments-grid" id="departmentsGrid">
        <!-- Cards will be loaded here -->
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal" id="departmentModal">
    <div class="modal-dialog modal-md">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Novo Departamento</h3>
        <button class="modal-close" onclick="Modal.close('departmentModal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="departmentForm">
          <input type="hidden" name="id">
          <div class="form-group">
            <label class="form-label">Nome do Departamento *</label>
            <input type="text" class="form-input" name="nome" required>
          </div>
          <div class="form-group">
            <label class="form-label">Descrição</label>
            <textarea class="form-input" name="descricao" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Departamento Pai</label>
            <select class="form-select" name="departamentoPaiId" id="parentDeptSelect">
              <option value="">Nenhum (Raiz)</option>
            </select>
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" name="ativo" checked>
              <span>Departamento Ativo</span>
            </label>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('departmentModal')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveDepartment()">Salvar</button>
      </div>
    </div>
  </div>

  <style>
    .departments-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: var(--spacing-4);
    }

    .department-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: var(--spacing-5);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-200);
      transition: all 0.2s;
    }

    .department-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .department-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--spacing-4);
    }

    .department-icon {
      width: 48px;
      height: 48px;
      background: var(--gray-100);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .department-actions {
      display: flex;
      gap: var(--spacing-1);
    }

    .department-name {
      font-size: var(--font-size-lg);
      font-weight: 600;
      color: var(--gray-800);
      margin-bottom: var(--spacing-1);
    }

    .department-desc {
      font-size: var(--font-size-sm);
      color: var(--gray-500);
      margin-bottom: var(--spacing-4);
    }

    .department-stats {
      display: flex;
      gap: var(--spacing-6);
      padding-top: var(--spacing-4);
      border-top: 1px solid var(--gray-100);
    }

    .department-stat {
      text-align: center;
    }

    .department-stat-value {
      font-size: var(--font-size-xl);
      font-weight: 700;
      color: var(--primary-dark);
    }

    .department-stat-label {
      font-size: var(--font-size-xs);
      color: var(--gray-500);
      text-transform: uppercase;
    }
  </style>

  <div th:replace="~{fragments/scripts :: common}"></div>
  <script>
    const API = '/api/departments';

    // Mock data (fallback caso API nao esteja disponivel)
    const mockDepartments = [
      { id: 1, nome: "Tecnologia", descricao: "Desenvolvimento de sistemas e infraestrutura", funcionarios: 45, cargos: 8, ativo: true },
      { id: 2, nome: "Recursos Humanos", descricao: "Gestão de pessoas e cultura organizacional", funcionarios: 12, cargos: 5, ativo: true },
      { id: 3, nome: "Financeiro", descricao: "Contabilidade, tesouraria e planejamento financeiro", funcionarios: 18, cargos: 6, ativo: true },
      { id: 4, nome: "Comercial", descricao: "Vendas, marketing e relacionamento com clientes", funcionarios: 35, cargos: 7, ativo: true },
      { id: 5, nome: "Operações", descricao: "Logística, produção e gestão operacional", funcionarios: 52, cargos: 9, ativo: true },
      { id: 6, nome: "Jurídico", descricao: "Assessoria jurídica e compliance", funcionarios: 8, cargos: 3, ativo: true }
    ];

    let departments = [];
    let currentDeptId = null;

    document.addEventListener("DOMContentLoaded", () => {
      if (!Auth.requireAuth()) return;
      initUserMenu();
      initSidebar();
      Auth.applyRoleVisibility(document);
      Auth.applyActionVisibility(document);
      loadData();
    });

    async function loadData() {
      try {
        const [listRes, statsRes] = await Promise.all([
          fetch(API, { credentials: 'same-origin' }),
          fetch(API + '/stats', { credentials: 'same-origin' })
        ]);
        if (!listRes.ok) throw new Error('API indisponível');
        departments = await listRes.json();
        const stats = await statsRes.json();
        document.getElementById("statTotal").textContent = stats.total;
        document.getElementById("statAtivos").textContent = stats.ativos;
        document.getElementById("statFuncionarios").textContent = stats.funcionarios;
        document.getElementById("statMedia").textContent = stats.media;
      } catch (e) {
        console.log('Usando dados mock:', e.message);
        departments = mockDepartments;
        updateStatsLocal();
      }
      render();
    }

    function updateStatsLocal() {
      const total = departments.length;
      const ativos = departments.filter(d => d.ativo).length;
      const funcionarios = departments.reduce((sum, d) => sum + (d.funcionarios || 0), 0);
      const media = total > 0 ? Math.round(funcionarios / total) : 0;
      document.getElementById("statTotal").textContent = total;
      document.getElementById("statAtivos").textContent = ativos;
      document.getElementById("statFuncionarios").textContent = funcionarios;
      document.getElementById("statMedia").textContent = media;
    }

    function render() {
      const grid = document.getElementById("departmentsGrid");
      grid.innerHTML = departments.map(dept => `
        <div class="department-card">
          <div class="department-header">
            <div class="department-actions">
              <button class="btn-icon edit" onclick="edit(${dept.id})" title="Editar"><img src="/assets/pencil (1).png" alt="editar"></button>
              <button class="btn-icon delete" onclick="remove(${dept.id})" title="Excluir"><img src="/assets/trash-2 (1).png" alt="excluir"></button>
            </div>
          </div>
          <h3 class="department-name">${dept.nome}</h3>
          <p class="department-desc">${dept.descricao || 'Sem descrição'}</p>
          <div class="department-stats">
            <div class="department-stat">
              <div class="department-stat-value">${dept.funcionarios || 0}</div>
              <div class="department-stat-label">Funcionários</div>
            </div>
            <div class="department-stat">
              <div class="department-stat-value">${dept.cargos || 0}</div>
              <div class="department-stat-label">Cargos</div>
            </div>
            <div class="department-stat">
              <span class="badge ${dept.ativo ? 'badge-success' : 'badge-danger'}">${dept.ativo ? 'Ativo' : 'Inativo'}</span>
            </div>
          </div>
        </div>
      `).join('');

      // Update parent select
      const select = document.getElementById("parentDeptSelect");
      select.innerHTML = '<option value="">Nenhum (Raiz)</option>' +
        departments.map(d => '<option value="' + d.id + '">' + d.nome + '</option>').join('');
    }

    function openModal(id = null) {
      currentDeptId = id;
      document.getElementById("departmentForm").reset();
      if (id) {
        document.getElementById("modalTitle").textContent = "Editar Departamento";
        const dept = departments.find(d => d.id === id);
        if (dept) Form.populate('departmentForm', dept);
      } else {
        document.getElementById("modalTitle").textContent = "Novo Departamento";
      }
      Modal.open('departmentModal');
    }

    function edit(id) { openModal(id); }

    async function saveDepartment() {
      const formData = Form.serialize('departmentForm');
      if (!formData.nome) { Toast.error('Nome é obrigatório'); return; }

      const body = {
        nome: formData.nome,
        descricao: formData.descricao || null,
        departamentoPaiId: formData.departamentoPaiId ? Number(formData.departamentoPaiId) : null,
        ativo: !!formData.ativo
      };

      try {
        let res;
        if (currentDeptId) {
          res = await fetch(API + '/' + currentDeptId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify(body) });
        } else {
          res = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify(body) });
        }
        if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error || 'Erro ao salvar'); }
        Toast.success(currentDeptId ? 'Departamento atualizado!' : 'Departamento criado!');
        Modal.close('departmentModal');
        loadData();
      } catch (e) {
        console.error(e);
        Toast.error(e.message || 'Erro ao salvar departamento');
      }
    }

    function remove(id) {
      const dept = departments.find(d => d.id === id);
      Confirm.show('Excluir o departamento <strong>' + dept.nome + '</strong>?', async () => {
        try {
          const res = await fetch(API + '/' + id, { method: 'DELETE', credentials: 'same-origin' });
          if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error || 'Erro ao excluir'); }
          Toast.success('Departamento excluído!');
          loadData();
        } catch (e) {
          console.error(e);
          Toast.error(e.message || 'Erro ao excluir departamento');
        }
      });
    }
  </script>
</body>

</html>
