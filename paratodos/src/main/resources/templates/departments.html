<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Departamentos')}"><title>Departamentos</title></head>

<body>
  <script th:inline="javascript">
    window.__CURRENT_USER__ = {
      email: /*[[${currentUser.email}]]*/ 'usuario@local',
      role:  /*[[${currentUser.role}]]*/ 'EMPLOYEE'
    };
  </script>

  <aside th:replace="~{fragments/sidebar :: admin('departments')}"></aside>

  <div class="main-content">
    <header th:replace="~{fragments/topbar :: topbar('Departamentos')}"></header>

    <div class="content-area">
      <div class="page-header">
        <div>
          <h2 class="page-title">Quadro de Lotação</h2>
          <p class="page-subtitle">Departamentos e quantidade de funcionários</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openModal()">+ Novo Departamento</button>
        </div>
      </div>

      <div class="departments-grid" id="departmentsGrid"></div>
    </div>
  </div>

  <!-- Modal: Editar Departamento -->
  <div class="modal" id="departmentModal">
    <div class="modal-dialog modal-md">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Novo Departamento</h3>
        <button class="modal-close" onclick="Modal.close('departmentModal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="departmentForm">
          <input type="hidden" name="id">
          <div class="form-group">
            <label class="form-label">Nome do Departamento *</label>
            <input type="text" class="form-input" name="nome" required>
          </div>
          <div class="form-group">
            <label class="form-label">Descrição</label>
            <textarea class="form-input" name="descricao" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" name="ativo" checked>
              <span>Departamento Ativo</span>
            </label>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('departmentModal')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveDepartment()">Salvar</button>
      </div>
    </div>
  </div>

  <style>
    .departments-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--spacing-4);
    }
    .department-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: var(--spacing-5);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-200);
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .department-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .department-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--spacing-3);
    }
    .department-name {
      font-size: var(--font-size-lg);
      font-weight: 600;
      color: var(--gray-800);
      margin-bottom: var(--spacing-1);
    }
    .department-desc {
      font-size: var(--font-size-sm);
      color: var(--gray-500);
      margin-bottom: var(--spacing-4);
      min-height: 20px;
    }
    .department-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: var(--spacing-4);
      border-top: 1px solid var(--gray-100);
    }
    .department-count {
      display: flex;
      align-items: center;
      gap: var(--spacing-2);
    }
    .department-count-value {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      color: var(--primary-dark);
    }
    .department-count-label {
      font-size: var(--font-size-xs);
      color: var(--gray-500);
      text-transform: uppercase;
    }
  </style>

  <div th:replace="~{fragments/scripts :: common}"></div>
  <script>
    const API = '/api/departments';
    let departments = [];
    let currentDeptId = null;

    document.addEventListener("DOMContentLoaded", () => {
      if (!Auth.requireAuth()) return;
      initUserMenu();
      initSidebar();
      Auth.applyRoleVisibility(document);
      Auth.applyActionVisibility(document);
      loadData();
    });

    async function loadData() {
      try {
        const res = await fetch(API, { credentials: 'same-origin' });
        if (!res.ok) throw new Error('API indisponível');
        departments = await res.json();
      } catch (e) {
        console.error('Erro ao carregar departamentos:', e);
        departments = [];
      }
      render();
    }

    function render() {
      const grid = document.getElementById("departmentsGrid");
      if (departments.length === 0) {
        grid.innerHTML = '<div class="empty-state"><h3 class="empty-state-title">Nenhum departamento cadastrado</h3></div>';
        return;
      }
      grid.innerHTML = departments.map(dept => `
        <div class="department-card">
          <div>
            <div class="department-header">
              <div>
                <h3 class="department-name">${dept.nome}</h3>
                <span class="badge ${dept.ativo ? 'badge-success' : 'badge-danger'}">${dept.ativo ? 'Ativo' : 'Inativo'}</span>
              </div>
              <button class="btn-icon edit" onclick="edit(${dept.id})" title="Editar"><img src="/assets/pencil (1).png" alt="editar"></button>
            </div>
            <p class="department-desc">${dept.descricao || 'Sem descrição'}</p>
          </div>
          <div class="department-footer">
            <div class="department-count">
              <span class="department-count-value">${dept.funcionarios || 0}</span>
              <span class="department-count-label">funcionários</span>
            </div>
            <div class="department-count">
              <span class="department-count-value">${dept.cargos || 0}</span>
              <span class="department-count-label">cargos</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function openModal(id = null) {
      currentDeptId = id;
      document.getElementById("departmentForm").reset();
      if (id) {
        document.getElementById("modalTitle").textContent = "Editar Departamento";
        const dept = departments.find(d => d.id === id);
        if (dept) Form.populate('departmentForm', dept);
      } else {
        document.getElementById("modalTitle").textContent = "Novo Departamento";
      }
      Modal.open('departmentModal');
    }

    function edit(id) { openModal(id); }

    async function saveDepartment() {
      const formData = Form.serialize('departmentForm');
      if (!formData.nome) { Toast.error('Nome é obrigatório'); return; }

      const body = {
        nome: formData.nome,
        descricao: formData.descricao || null,
        ativo: !!formData.ativo
      };

      try {
        let res;
        if (currentDeptId) {
          res = await fetch(API + '/' + currentDeptId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify(body) });
        } else {
          res = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify(body) });
        }
        if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error || 'Erro ao salvar'); }
        Toast.success(currentDeptId ? 'Departamento atualizado!' : 'Departamento criado!');
        Modal.close('departmentModal');
        loadData();
      } catch (e) {
        console.error(e);
        Toast.error(e.message || 'Erro ao salvar departamento');
      }
    }
  </script>
</body>

</html>
