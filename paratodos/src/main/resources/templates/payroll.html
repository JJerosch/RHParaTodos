<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Folha de Pagamento')}"><title>Folha de Pagamento</title></head>

<body>
  <script th:inline="javascript">
    window.__CURRENT_USER__ = {
      email: /*[[${currentUser.email}]]*/ 'usuario@local',
      role:  /*[[${currentUser.role}]]*/ 'EMPLOYEE'
    };
  </script>

  <aside th:replace="~{fragments/sidebar :: admin('payroll')}"></aside>

  <div class="main-content">
    <header th:replace="~{fragments/topbar :: topbar('Folha de Pagamento')}"></header>

    <div class="content-area">
      <div class="stats-row">
        <div class="stat-box"><div class="stat-box-icon" style="background: rgba(44, 62, 80, 0.1); color: var(--primary-dark);"><img th:src="@{/assets/scroll.png}" alt="icone_total_folha"></div><div class="stat-box-value" id="statTotal">R$ 0</div><div class="stat-box-label">Total da Folha</div></div>
        <div class="stat-box"><div class="stat-box-icon" style="background: rgba(39, 174, 96, 0.1); color: var(--success-green);"><img th:src="@{/assets/dollar-sign.png}" alt="icone_total_liquido"></div><div class="stat-box-value" id="statLiquido">R$ 0</div><div class="stat-box-label">Total Líquido</div></div>
        <div class="stat-box"><div class="stat-box-icon" style="background: rgba(231, 76, 60, 0.1); color: var(--error-red);"><img th:src="@{/assets/percent.png}" alt="icone_total_descontos"></div><div class="stat-box-value" id="statDescontos">R$ 0</div><div class="stat-box-label">Total Descontos</div></div>
        <div class="stat-box"><div class="stat-box-icon" style="background: rgba(243, 156, 18, 0.1); color: var(--warning-orange);"><img th:src="@{/assets/users (1).png}" alt="icone_funcionarios"></div><div class="stat-box-value" id="statFuncionarios">0</div><div class="stat-box-label">Funcionários</div></div>
      </div>

      <div class="page-header">
        <div><h2 class="page-title">Folha de Pagamento</h2><p class="page-subtitle">Competência: <strong id="competencia">Janeiro/2026</strong></p></div>
        <div class="page-actions">
          <button class="btn btn-secondary" onclick="exportPayroll()"><img th:src="@{/assets/folder-output.png}" alt="icone_exportar"> Exportar</button>
          <button class="btn btn-secondary" onclick="generatePayroll()"><img th:src="@{/assets/file-plus-corner (1).png}" alt="icone_gerar_folha"> Gerar Folha</button>
          <button class="btn btn-primary" onclick="approvePayroll()">Aprovar Folha</button>
        </div>
      </div>

      <div class="filters-bar">
        <div class="filter-group"><label>Mês:</label><select id="filterMonth" onchange="filter()"><option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option><option value="04">Abril</option><option value="05">Maio</option><option value="06">Junho</option><option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option><option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option></select></div>
        <div class="filter-group"><label>Ano:</label><select id="filterYear" onchange="filter()"><option value="2026">2026</option><option value="2025">2025</option><option value="2024">2024</option></select></div>
        <div class="search-box"><input type="text" id="search" placeholder="Buscar funcionário..." onkeyup="filter()"></div>
      </div>

      <div class="table-container">
        <table class="data-table">
          <thead><tr><th>Funcionário</th><th class="hide-mobile">Departamento</th><th>Salário Base</th><th class="hide-mobile">Proventos</th><th class="hide-mobile">Descontos</th><th>Líquido</th><th>Status</th><th>Ações</th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal" id="detailModal">
    <div class="modal-dialog modal-lg">
      <div class="modal-header"><h3 class="modal-title">Detalhes do Holerite</h3><button class="modal-close" onclick="Modal.close('detailModal')">&times;</button></div>
      <div class="modal-body" id="detailContent"></div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="Modal.close('detailModal')">Fechar</button><button class="btn btn-primary" onclick="printPayslip()"><img th:src="@{/assets/printer (2).png}" alt="icone_imprimir"> Imprimir</button></div>
    </div>
  </div>

  <div th:replace="~{fragments/scripts :: common}"></div>
  <script>
    var payrollData = [
      { id: 1, matricula: "001234", nome: "João Silva Santos", departamento: "Tecnologia", salario_base: 12500, proventos: 1250, descontos: 2875, liquido: 10875, status: "PENDENTE" },
      { id: 2, matricula: "001235", nome: "Maria Oliveira Costa", departamento: "RH", salario_base: 9800, proventos: 980, descontos: 2156, liquido: 8624, status: "APROVADO" },
      { id: 3, matricula: "001236", nome: "Pedro Henrique Almeida", departamento: "Financeiro", salario_base: 6500, proventos: 650, descontos: 1495, liquido: 5655, status: "PENDENTE" },
      { id: 4, matricula: "001237", nome: "Ana Paula Ferreira", departamento: "Comercial", salario_base: 15000, proventos: 3500, descontos: 4625, liquido: 13875, status: "APROVADO" },
      { id: 5, matricula: "001238", nome: "Carlos Eduardo Lima", departamento: "Operações", salario_base: 5200, proventos: 520, descontos: 1196, liquido: 4524, status: "PENDENTE" }
    ];
    var filtered = payrollData.slice();

    document.addEventListener("DOMContentLoaded", function () {
      if (!Auth.requireAuth()) return;
      initUserMenu(); initSidebar();
      Auth.applyRoleVisibility(document); Auth.applyActionVisibility(document);
      render(); updateStats();
    });

    function updateStats() {
      var total = payrollData.reduce(function(s,p){return s+p.salario_base+p.proventos;},0);
      var liquido = payrollData.reduce(function(s,p){return s+p.liquido;},0);
      var descontos = payrollData.reduce(function(s,p){return s+p.descontos;},0);
      document.getElementById("statTotal").textContent = formatCurrency(total);
      document.getElementById("statLiquido").textContent = formatCurrency(liquido);
      document.getElementById("statDescontos").textContent = formatCurrency(descontos);
      document.getElementById("statFuncionarios").textContent = payrollData.length;
    }

    function filter() {
      var search = document.getElementById("search").value.toLowerCase();
      filtered = payrollData.filter(function(p){return !search || p.nome.toLowerCase().includes(search) || p.matricula.includes(search);});
      render();
    }

    function render() {
      document.getElementById("tableBody").innerHTML = filtered.map(function(p) {
        return '<tr><td><div class="cell-avatar"><div class="avatar">' + p.nome.split(' ').map(function(n){return n[0];}).slice(0,2).join('') + '</div><div class="cell-info"><span class="cell-primary">' + p.nome + '</span><span class="cell-secondary">' + p.matricula + '</span></div></div></td><td class="hide-mobile">' + p.departamento + '</td><td>' + formatCurrency(p.salario_base) + '</td><td class="hide-mobile" style="color: var(--success-green);">+' + formatCurrency(p.proventos) + '</td><td class="hide-mobile" style="color: var(--error-red);">-' + formatCurrency(p.descontos) + '</td><td><strong>' + formatCurrency(p.liquido) + '</strong></td><td><span class="badge ' + (p.status==='APROVADO'?'badge-success':'badge-warning') + '">' + p.status + '</span></td><td><div class="cell-actions"><button class="btn-icon view" onclick="viewDetails(' + p.id + ')" title="Ver Holerite"><img src="/assets/eye.png" alt="icone_ver_holerite"></button><button class="btn-icon edit" onclick="editPayroll(' + p.id + ')" title="Editar"><img src="/assets/pencil (1).png" alt="icone_editar"></button></div></td></tr>';
      }).join('');
    }

    function viewDetails(id) {
      var p = payrollData.find(function(x){return x.id===id;});
      if (!p) return;
      document.getElementById("detailContent").innerHTML = '<div style="border-bottom: 2px solid var(--gray-200); padding-bottom: var(--spacing-4); margin-bottom: var(--spacing-4);"><h2 style="margin: 0;">' + p.nome + '</h2><p style="color: var(--gray-500);">Matrícula: ' + p.matricula + ' | ' + p.departamento + '</p></div><div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-6);"><div><h4 style="color: var(--success-green); margin-bottom: var(--spacing-3);">Proventos</h4><table style="width: 100%;"><tr><td>Salário Base</td><td style="text-align: right;">' + formatCurrency(p.salario_base) + '</td></tr><tr><td>Hora Extra</td><td style="text-align: right;">' + formatCurrency(p.proventos*0.5) + '</td></tr><tr><td>Adicional Noturno</td><td style="text-align: right;">' + formatCurrency(p.proventos*0.3) + '</td></tr><tr style="font-weight: bold; border-top: 1px solid var(--gray-200);"><td>Total Proventos</td><td style="text-align: right;">' + formatCurrency(p.salario_base+p.proventos) + '</td></tr></table></div><div><h4 style="color: var(--error-red); margin-bottom: var(--spacing-3);">Descontos</h4><table style="width: 100%;"><tr><td>INSS</td><td style="text-align: right;">' + formatCurrency(p.descontos*0.4) + '</td></tr><tr><td>IRRF</td><td style="text-align: right;">' + formatCurrency(p.descontos*0.35) + '</td></tr><tr><td>Vale Transporte</td><td style="text-align: right;">' + formatCurrency(p.descontos*0.15) + '</td></tr><tr style="font-weight: bold; border-top: 1px solid var(--gray-200);"><td>Total Descontos</td><td style="text-align: right;">' + formatCurrency(p.descontos) + '</td></tr></table></div></div><div style="background: var(--gray-50); padding: var(--spacing-4); border-radius: var(--radius-md); margin-top: var(--spacing-6); text-align: center;"><h3 style="margin: 0; color: var(--primary-dark);">Salário Líquido: ' + formatCurrency(p.liquido) + '</h3></div>';
      Modal.open('detailModal');
    }

    function editPayroll(id) { Toast.info('Funcionalidade em desenvolvimento'); }
    function generatePayroll() { Toast.success('Folha gerada com sucesso!'); }
    function approvePayroll() { Toast.success('Folha aprovada com sucesso!'); }
    function exportPayroll() { Toast.success('Exportação iniciada!'); }
    function printPayslip() { window.print(); }
    function formatCurrency(val) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0); }
  </script>
</body>

</html>
