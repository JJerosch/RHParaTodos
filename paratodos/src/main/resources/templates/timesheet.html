<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Controle de Ponto')}">
  <title>Controle de Ponto</title>
</head>

<body>
<style>
  .timesheet-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: var(--spacing-4);
    margin-bottom: var(--spacing-6);
  }

  .time-card {
    background: white;
    border-radius: var(--radius-lg);
    padding: var(--spacing-5);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--gray-200);
    text-align: center;
  }

  .time-card-icon {
    font-size: 28px;
    margin-bottom: var(--spacing-2);
  }

  .time-card-value {
    font-size: var(--font-size-3xl);
    font-weight: 700;
    color: var(--primary-dark);
  }

  .time-card-label {
    font-size: var(--font-size-sm);
    color: var(--gray-500);
  }

  .filters-card {
    background: white;
    border-radius: var(--radius-lg);
    padding: var(--spacing-5);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--gray-200);
    margin-bottom: var(--spacing-6);
  }
</style>

<script th:inline="javascript">
  window.__CURRENT_USER__ = {
    email: /*[[${currentUser.email}]]*/ 'usuario@local',
    role:  /*[[${currentUser.role}]]*/ 'ADMIN'
  };
</script>

<aside th:replace="~{fragments/sidebar :: admin('timesheet')}"></aside>

<div class="main-content">
  <header th:replace="~{fragments/topbar :: topbar('Controle de Ponto')}"></header>

  <div class="content-area">
    <div class="filters-card">
      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: var(--spacing-4); align-items:end;">
        <div class="form-group">
          <label class="form-label">Nome do funcionário</label>
          <input type="text" class="form-input" id="nomeFuncionario" placeholder="Digite o nome">
        </div>

        <div class="form-group">
          <label class="form-label">Data inicial</label>
          <input type="date" class="form-input" id="dataInicio">
        </div>

        <div class="form-group">
          <label class="form-label">Data final</label>
          <input type="date" class="form-input" id="dataFim">
        </div>

        <div class="form-group" style="display:flex; gap: var(--spacing-3);">
          <button class="btn btn-primary" type="button" onclick="carregarTimesheet()">Filtrar</button>
          <button class="btn btn-secondary" type="button" onclick="limparFiltros()">Limpar filtros</button>
        </div>
      </div>
    </div>

    <div class="timesheet-grid">
      <div class="time-card">
        <div class="time-card-icon">👥</div>
        <div class="time-card-value" id="totalFuncionarios">0</div>
        <div class="time-card-label">Funcionários no período</div>
      </div>
      <div class="time-card">
        <div class="time-card-icon">📄</div>
        <div class="time-card-value" id="totalRegistros">0</div>
        <div class="time-card-label">Registros apurados</div>
      </div>
      <div class="time-card">
        <div class="time-card-icon">⏱️</div>
        <div class="time-card-value" id="totalHorasTrabalhadas">00:00</div>
        <div class="time-card-label">Horas trabalhadas</div>
      </div>
      <div class="time-card">
        <div class="time-card-icon">➕</div>
        <div class="time-card-value" id="totalHorasExtras">00:00</div>
        <div class="time-card-label">Horas extras</div>
      </div>
      <div class="time-card">
        <div class="time-card-icon">➖</div>
        <div class="time-card-value" id="totalHorasFaltantes">00:00</div>
        <div class="time-card-label">Horas faltantes</div>
      </div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: var(--spacing-4);">
        <h3>Resumo Administrativo de Ponto</h3>
      </div>

      <table class="data-table">
        <thead>
        <tr>
          <th>Data</th>
          <th>Funcionário</th>
          <th>Entrada</th>
          <th>Saída Almoço</th>
          <th>Retorno</th>
          <th>Saída</th>
          <th>Total</th>
          <th>Extras</th>
          <th>Faltantes</th>
          <th>Status</th>
        </tr>
        </thead>
        <tbody id="timesheetTableBody">
        <tr>
          <td colspan="10" style="text-align:center; padding: var(--spacing-6); color: var(--gray-400);">
            Carregando dados...
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div th:replace="~{fragments/scripts :: common}"></div>

<script>
  document.addEventListener("DOMContentLoaded", async () => {
    if (!Auth.requireAuth()) return;
    initUserMenu();
    initSidebar();
    Auth.applyRoleVisibility(document);
    Auth.applyActionVisibility(document);

    preencherDatasPadrao();
    await carregarTimesheet();
  });

  function preencherDatasPadrao() {
    const hoje = new Date();
    const yyyy = hoje.getFullYear();
    const mm = String(hoje.getMonth() + 1).padStart(2, "0");
    const dd = String(hoje.getDate()).padStart(2, "0");

    const primeiroDia = `${yyyy}-${mm}-01`;
    const hojeStr = `${yyyy}-${mm}-${dd}`;

    document.getElementById("dataInicio").value = primeiroDia;
    document.getElementById("dataFim").value = hojeStr;
  }

  async function carregarTimesheet() {
    try {
      const nome = document.getElementById("nomeFuncionario").value;
      const inicio = document.getElementById("dataInicio").value;
      const fim = document.getElementById("dataFim").value;

      const params = new URLSearchParams();
      if (nome) params.append("nome", nome);
      if (inicio) params.append("inicio", inicio);
      if (fim) params.append("fim", fim);

      const resp = await fetch(`/api/admin/timesheet?${params.toString()}`, {
        method: "GET",
        credentials: "same-origin"
      });

      if (!resp.ok) {
        Toast.error("Não foi possível carregar o timesheet.");
        return;
      }

      const data = await resp.json();
      renderSummary(data.summary);
      renderRows(data.rows);
    } catch (e) {
      console.error(e);
      Toast.error("Erro ao carregar o timesheet.");
    }
  }

  function renderSummary(summary) {
    document.getElementById("totalFuncionarios").textContent = summary.totalFuncionarios ?? 0;
    document.getElementById("totalRegistros").textContent = summary.totalRegistros ?? 0;
    document.getElementById("totalHorasTrabalhadas").textContent = summary.totalHorasTrabalhadas ?? "00:00";
    document.getElementById("totalHorasExtras").textContent = summary.totalHorasExtras ?? "00:00";
    document.getElementById("totalHorasFaltantes").textContent = summary.totalHorasFaltantes ?? "00:00";
  }

  function renderRows(rows) {
    const tbody = document.getElementById("timesheetTableBody");

    if (!rows || !rows.length) {
      tbody.innerHTML = `
        <tr>
          <td colspan="10" style="text-align:center; padding: var(--spacing-6); color: var(--gray-400);">
            Nenhum registro encontrado para o período informado.
          </td>
        </tr>
      `;
      return;
    }

    tbody.innerHTML = rows.map(row => `
      <tr>
        <td>${row.data}</td>
        <td>${row.funcionarioNome}</td>
        <td>${row.entrada}</td>
        <td>${row.saidaAlmoco}</td>
        <td>${row.retornoAlmoco}</td>
        <td>${row.saida}</td>
        <td>${row.horasTrabalhadas}</td>
        <td>${row.horasExtras}</td>
        <td>${row.horasFaltantes}</td>
        <td>${renderStatus(row.status)}</td>
      </tr>
    `).join("");
  }
  function limparFiltros() {
    document.getElementById("nomeFuncionario").value = "";
    preencherDatasPadrao();
    carregarTimesheet();
  }
  
  function renderStatus(status) {
    if (status === "FINALIZADO") {
      return `<span class="badge badge-success">Finalizado</span>`;
    }
    return `<span class="badge badge-warning">Em andamento</span>`;
  }
</script>
</body>
</html>
