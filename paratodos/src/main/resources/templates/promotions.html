<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Promoções')}"><title>Promoções</title></head>

<body>
  <script th:inline="javascript">
    window.__CURRENT_USER__ = {
      email: /*[[${currentUser.email}]]*/ 'usuario@local',
      role:  /*[[${currentUser.role}]]*/ 'EMPLOYEE'
    };
  </script>

  <aside th:replace="~{fragments/sidebar :: admin('promotions')}"></aside>

  <div class="main-content">
    <header th:replace="~{fragments/topbar :: topbar('Promoções')}"></header>

    <div class="content-area">
      <div class="page-header">
        <div>
          <h2 class="page-title">Promoções</h2>
          <p class="page-subtitle">Selecione um funcionário para solicitar promoção, transferência ou reajuste</p>
        </div>
      </div>

      <!-- Filtro -->
      <div class="filters-bar">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Buscar por nome..." oninput="filterList()">
        </div>
        <div class="filter-group">
          <label>Departamento:</label>
          <select id="filterDept" onchange="filterList()">
            <option value="">Todos</option>
          </select>
        </div>
      </div>

      <!-- Lista de funcionários -->
      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>Funcionário</th>
              <th>Cargo</th>
              <th>Departamento</th>
              <th class="hide-mobile">Admissão</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="5" style="text-align:center; padding: 2rem; color: var(--gray-400);">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal: Solicitar Promoção -->
  <div class="modal" id="promotionModal">
    <div class="modal-dialog modal-md">
      <div class="modal-header">
        <h3 class="modal-title">Nova Solicitação</h3>
        <button class="modal-close" onclick="Modal.close('promotionModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div id="funcInfo" style="background: var(--gray-50); border-radius: var(--radius-md); padding: var(--spacing-4); margin-bottom: var(--spacing-4);"></div>
        <form id="promotionForm">
          <input type="hidden" name="funcionarioId" id="funcIdInput">
          <div class="form-group">
            <label class="form-label">Tipo *</label>
            <select class="form-select" name="tipo" required>
              <option value="PROMOCAO">Promoção</option>
              <option value="TRANSFERENCIA">Transferência</option>
              <option value="REAJUSTE">Reajuste Salarial</option>
            </select>
          </div>
          <div class="form-row form-row-2">
            <div class="form-group">
              <label class="form-label">Novo Departamento</label>
              <select class="form-select" name="departamentoNovoId" id="deptSelect">
                <option value="">Manter atual</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Novo Cargo</label>
              <select class="form-select" name="cargoNovoId" id="cargoSelect">
                <option value="">Manter atual</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Novo Salário</label>
            <input type="text" class="form-input" name="salarioNovo" data-mask="currency" placeholder="Deixe vazio para manter atual">
          </div>
          <div class="form-group">
            <label class="form-label">Motivo/Justificativa *</label>
            <textarea class="form-input" name="motivo" rows="3" required placeholder="Descreva o motivo da solicitação..."></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('promotionModal')">Cancelar</button>
        <button class="btn btn-primary" onclick="submitPromotion()">Enviar Solicitação</button>
      </div>
    </div>
  </div>

  <div th:replace="~{fragments/scripts :: common}"></div>
  <script>
    let allFuncionarios = [];
    let filtered = [];
    let departamentos = [];
    let cargos = [];

    async function api(url, opts = {}) {
      const res = await fetch(url, { credentials: 'same-origin', headers: { 'Content-Type': 'application/json', ...opts.headers }, ...opts });
      if (res.status === 401) { window.location.href = '/login'; return; }
      if (res.status === 204) return null;
      const body = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(body.error || 'Erro na requisição');
      return body;
    }

    document.addEventListener("DOMContentLoaded", async () => {
      if (!Auth.requireAuth()) return;
      initUserMenu();
      initSidebar();
      Auth.applyRoleVisibility(document);
      Auth.applyActionVisibility(document);
      Mask.initAll();
      await loadData();
    });

    async function loadData() {
      try {
        const [funcsRes, deptsRes, cargosRes] = await Promise.all([
          fetch('/api/employees?size=10000&status=ATIVO&sort=nomeCompleto,asc', { credentials: 'same-origin' }),
          api('/api/employees/departamentos'),
          api('/api/employees/cargos')
        ]);

        const page = await funcsRes.json();
        // Filtrar apenas funcionários com cargo e departamento
        allFuncionarios = (page.content || []).filter(f => f.cargoId && f.departamentoId);
        departamentos = deptsRes || [];
        cargos = cargosRes || [];

        // Preencher dropdowns do filtro
        const filterDept = document.getElementById("filterDept");
        departamentos.forEach(d => {
          filterDept.innerHTML += '<option value="' + d.id + '">' + d.nome + '</option>';
        });

        // Preencher dropdowns do modal
        const deptSelect = document.getElementById("deptSelect");
        departamentos.forEach(d => {
          deptSelect.innerHTML += '<option value="' + d.id + '">' + d.nome + '</option>';
        });
        const cargoSelect = document.getElementById("cargoSelect");
        cargos.forEach(c => {
          cargoSelect.innerHTML += '<option value="' + c.id + '">' + c.titulo + '</option>';
        });

      } catch (e) {
        console.error('Erro ao carregar dados:', e);
        allFuncionarios = [];
      }
      filterList();
    }

    function filterList() {
      const search = document.getElementById("searchInput").value.toLowerCase();
      const dept = document.getElementById("filterDept").value;
      filtered = allFuncionarios.filter(f =>
        (!search || f.nomeCompleto.toLowerCase().includes(search)) &&
        (!dept || String(f.departamentoId) === dept)
      );
      render();
    }

    function getInitials(name) {
      return (name || '').split(' ').map(n => n[0]).slice(0, 2).join('').toUpperCase();
    }

    function formatDate(d) {
      if (!d) return '-';
      return new Date(d + 'T00:00:00').toLocaleDateString('pt-BR');
    }

    function render() {
      const tbody = document.getElementById("tableBody");
      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><h3 class="empty-state-title">Nenhum funcionário encontrado</h3><p class="empty-state-text">Apenas funcionários com cargo e departamento atribuídos aparecem aqui.</p></div></td></tr>';
        return;
      }
      tbody.innerHTML = filtered.map(f => `
        <tr>
          <td>
            <div class="cell-avatar">
              <div class="avatar">${getInitials(f.nomeCompleto)}</div>
              <span class="cell-primary">${f.nomeCompleto}</span>
            </div>
          </td>
          <td>${f.cargoTitulo || '-'}</td>
          <td>${f.departamentoNome || '-'}</td>
          <td class="hide-mobile">${formatDate(f.dataAdmissao)}</td>
          <td>
            <button class="btn btn-primary" style="padding: 0.4rem 1rem; font-size: 0.85rem;" onclick="openPromoteModal(${f.id})">Promover</button>
          </td>
        </tr>
      `).join('');
    }

    function openPromoteModal(funcId) {
      const func = allFuncionarios.find(f => f.id === funcId);
      if (!func) return;

      document.getElementById("promotionForm").reset();
      document.getElementById("funcIdInput").value = funcId;
      document.getElementById("funcInfo").innerHTML = `
        <p style="margin: 0;"><strong>${func.nomeCompleto}</strong></p>
        <p style="margin: var(--spacing-1) 0 0; color: var(--gray-500); font-size: var(--font-size-sm);">
          ${func.cargoTitulo || '-'} - ${func.departamentoNome || '-'}
        </p>
      `;

      Modal.open('promotionModal');
      Mask.initAll();
    }

    async function submitPromotion() {
      const form = document.getElementById("promotionForm");
      if (!form.checkValidity()) { form.reportValidity(); return; }

      const formData = Form.serialize('promotionForm');
      const body = {
        funcionarioId: Number(formData.funcionarioId),
        tipo: formData.tipo,
        departamentoNovoId: formData.departamentoNovoId ? Number(formData.departamentoNovoId) : null,
        cargoNovoId: formData.cargoNovoId ? Number(formData.cargoNovoId) : null,
        salarioNovo: formData.salarioNovo ? parseFloat(String(formData.salarioNovo).replace(/[^\d,]/g, '').replace(',', '.')) : null,
        motivo: formData.motivo
      };

      try {
        await api('/api/promotions', { method: 'POST', body: JSON.stringify(body) });
        Toast.success('Solicitação enviada com sucesso!');
        Modal.close('promotionModal');
      } catch (e) {
        Toast.error(e.message || 'Erro ao enviar solicitação');
      }
    }
  </script>
</body>

</html>
