<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Meu Ponto')}">
    <title>Meu Ponto - Sistema RH Para Todos</title>
</head>

<body>

<script th:inline="javascript">
    window.__CURRENT_USER__ = {
        email: /*[[${currentUser.email}]]*/ 'usuario@local',
        role:  /*[[${currentUser.role}]]*/ 'EMPLOYEE'
    };
</script>

<aside th:replace="~{fragments/sidebar :: admin('meu-ponto')}"></aside>

<div class="main-content">
    <header th:replace="~{fragments/topbar :: topbar('Meu Ponto')}"></header>

    <div class="content-area">
        <div class="hero-card">
            <div class="hero-clock" id="clock">00:00:00</div>
            <div class="hero-date" id="heroDate">--</div>

            <div id="avisoDia" class="day-warning" style="display:none;"></div>

            <div class="hero-actions">
                <button id="btnEntrada" class="btn btn-primary hero-btn" type="button">
                    Registrar Entrada
                </button>
                <button id="btnSaida" class="btn btn-secondary hero-btn" type="button" disabled>
                    Registrar Saída
                </button>
            </div>
        </div>

        <div class="stats-grid four">
            <div class="stat-card">
                <div class="stat-content">
                    <p class="stat-value" id="horasHoje">00:00</p>
                    <small>Horas Hoje</small>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-content">
                    <p class="stat-value" id="horasSemana">00:00</p>
                    <small>Horas na Semana</small>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-content">
                    <p class="stat-value" id="horasMes">00:00</p>
                    <small>Horas no Mês</small>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-content">
                    <p class="stat-value" id="bancoHoras">+00:00</p>
                    <small>Banco de Horas</small>
                </div>
            </div>
        </div>

        <div class="dashboard-grid ponto-grid">
            <div class="dashboard-card">
                <div class="card-header">
                    <h2>Registros de Hoje</h2>
                </div>
                <div id="registrosHoje" class="empty-state-inline">
                    Carregando...
                </div>
            </div>

            <div class="dashboard-card">
                <div class="card-header">
                    <h2>Histórico da Semana</h2>
                </div>

                <div class="table-wrap">
                    <table class="table">
                        <thead>
                        <tr>
                            <th>DATA</th>
                            <th>ENTRADA</th>
                            <th>SAÍDA ALMOÇO</th>
                            <th>RETORNO</th>
                            <th>SAÍDA</th>
                            <th>TOTAL</th>
                        </tr>
                        </thead>
                        <tbody id="historicoSemanaBody">
                        <tr><td colspan="6" class="empty-state-inline">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .hero-card {
        background: #fff;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius-lg);
        padding: 32px 24px;
        margin-bottom: 24px;
        text-align: center;
    }

    .hero-clock {
        font-size: 56px;
        font-weight: 700;
        letter-spacing: 1px;
        color: var(--primary-dark);
        margin-bottom: 8px;
    }

    .hero-date {
        font-size: 18px;
        color: var(--gray-600);
        margin-bottom: 20px;
    }

    .hero-actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
    }

    .hero-btn {
        min-width: 220px;
        font-size: 16px;
        padding: 12px 18px;
        transition: opacity 0.2s ease, filter 0.2s ease;
    }

    .hero-btn:disabled {
        opacity: 0.45;
        filter: grayscale(15%);
        cursor: not-allowed;
    }

    .day-warning {
        margin: 0 auto 18px auto;
        max-width: 680px;
        padding: 12px 16px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 14px;
        border: 1px solid var(--gray-200);
        background: var(--gray-50);
        color: var(--gray-700);
    }

    .stats-grid.four {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 24px;
    }

    .stat-card {
        background: #fff;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius-lg);
        padding: 24px;
        text-align: center;
    }

    .stat-value {
        font-size: 34px;
        font-weight: 700;
        color: var(--primary-dark);
        margin: 0 0 6px 0;
    }

    .ponto-grid {
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: 20px;
    }

    .dashboard-card {
        background: #fff;
        border-radius: var(--radius-lg);
        border: 1px solid var(--gray-200);
        padding: 20px;
    }

    .card-header h2 {
        margin: 0 0 16px 0;
    }

    .empty-state-inline {
        color: var(--gray-400);
        font-size: 14px;
        padding: 20px 0;
        text-align: center;
    }

    .registro-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid var(--gray-100);
    }

    .registro-item:last-child {
        border-bottom: none;
    }

    .registro-tipo {
        font-weight: 600;
        color: var(--gray-700);
    }

    .registro-hora {
        color: var(--primary-dark);
        font-weight: 700;
    }

    .table-wrap {
        overflow-x: auto;
    }

    .table {
        width: 100%;
        border-collapse: collapse;
    }

    .table th,
    .table td {
        padding: 12px 10px;
        text-align: center;
        border-bottom: 1px solid var(--gray-100);
        font-size: 14px;
    }

    .table th {
        color: var(--gray-500);
        font-weight: 700;
    }

    @media (max-width: 1100px) {
        .stats-grid.four {
            grid-template-columns: repeat(2, 1fr);
        }

        .ponto-grid {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 768px) {
        .hero-clock {
            font-size: 42px;
        }

        .hero-date {
            font-size: 16px;
        }

        .stats-grid.four {
            grid-template-columns: 1fr;
        }

        .hero-btn {
            width: 100%;
        }
    }
</style>

<div th:replace="~{fragments/scripts :: common}"></div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        if (!Auth.requireAuth()) return;

        initUserMenu();
        initSidebar();
        Auth.applyRoleVisibility(document);
        Auth.applyActionVisibility(document);

        iniciarRelogio();
        carregarResumo();
        carregarHistoricoSemana();

        document.getElementById("btnEntrada").addEventListener("click", registrarPonto);
        document.getElementById("btnSaida").addEventListener("click", registrarPonto);
    });

    function iniciarRelogio() {
        function atualizar() {
            const agora = new Date();

            document.getElementById("clock").textContent = agora.toLocaleTimeString("pt-BR");

            const dataFormatada = agora.toLocaleDateString("pt-BR", {
                weekday: "long",
                year: "numeric",
                month: "long",
                day: "numeric"
            });

            document.getElementById("heroDate").textContent =
                dataFormatada.charAt(0).toUpperCase() + dataFormatada.slice(1);
        }

        atualizar();
        setInterval(atualizar, 1000);
    }

    async function carregarResumo() {
        try {
            const resp = await fetch("/api/my-timesheet/summary", {
                credentials: "same-origin"
            });

            const data = await resp.json();

            if (!resp.ok) {
                Toast.error(data.error || "Erro ao carregar resumo.");
                return;
            }

            document.getElementById("horasHoje").textContent = data.horasHoje || "00:00";
            document.getElementById("horasSemana").textContent = data.horasSemana || "00:00";
            document.getElementById("horasMes").textContent = data.horasMes || "00:00";
            document.getElementById("bancoHoras").textContent = data.bancoHoras || "+00:00";

            aplicarEstadoDoDia(data);
            renderRegistrosHoje(data.marcacoesHoje || []);
        } catch (e) {
            console.error(e);
            Toast.error("Erro ao carregar resumo.");
        }
    }

    function aplicarEstadoDoDia(data) {
        const tipoDia = data.tipoDia;
        const aviso = document.getElementById("avisoDia");
        const btnEntrada = document.getElementById("btnEntrada");
        const btnSaida = document.getElementById("btnSaida");

        btnEntrada.disabled = false;
        btnSaida.disabled = true;
        aviso.style.display = "none";
        aviso.textContent = "";

        const mensagensBloqueio = {
            FERIADO: "Hoje é feriado. O registro de ponto está indisponível.",
            RECESSO: "Hoje é recesso. O registro de ponto está indisponível.",
            FERIAS: "Você está em férias neste período. O registro de ponto está indisponível.",
            ATESTADO: "Há um atestado cadastrado para hoje. O registro de ponto está indisponível.",
            LICENCA: "Você está em licença neste período. O registro de ponto está indisponível.",
            FALTA_JUSTIFICADA: "Há uma falta justificada cadastrada para hoje. O registro de ponto está indisponível."
        };

        if (mensagensBloqueio[tipoDia]) {
            aviso.style.display = "block";
            aviso.textContent = mensagensBloqueio[tipoDia];
            btnEntrada.disabled = true;
            btnSaida.disabled = true;
            return;
        }

        const proximaAcao = data.proximaAcao || "ENTRADA";

        if (proximaAcao === "ENTRADA") {
            btnEntrada.disabled = false;
            btnSaida.disabled = true;
            btnEntrada.textContent = "Registrar Entrada";
            btnSaida.textContent = "Registrar Saída";
        } else if (
            proximaAcao === "SAIDA_ALMOCO" ||
            proximaAcao === "RETORNO_ALMOCO" ||
            proximaAcao === "SAIDA"
        ) {
            btnEntrada.disabled = true;
            btnSaida.disabled = false;
            btnSaida.textContent = traduzirAcao(proximaAcao);
        } else {
            btnEntrada.disabled = true;
            btnSaida.disabled = true;
            btnEntrada.textContent = "Registrar Entrada";
            btnSaida.textContent = "Registrar Saída";
        }
    }

    function traduzirAcao(acao) {
        if (acao === "SAIDA_ALMOCO") return "Registrar Saída Almoço";
        if (acao === "RETORNO_ALMOCO") return "Registrar Retorno";
        if (acao === "SAIDA") return "Registrar Saída";
        return acao || "Registrar Saída";
    }

    function formatarHoraDataHora(dataHora) {
        if (!dataHora) return "--:--";
        const data = new Date(dataHora);
        if (Number.isNaN(data.getTime())) return "--:--";
        return data.toLocaleTimeString("pt-BR", {
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    function renderRegistrosHoje(marcacoes) {
        const container = document.getElementById("registrosHoje");

        if (!marcacoes || marcacoes.length === 0) {
            container.innerHTML = '<div class="empty-state-inline">Nenhum registro hoje.</div>';
            return;
        }

        container.innerHTML = marcacoes.map(function (m) {
            return `
                <div class="registro-item">
                    <span class="registro-tipo">${formatarTipo(m.tipo)}</span>
                    <span class="registro-hora">${formatarHoraDataHora(m.dataHora)}</span>
                </div>
            `;
        }).join("");
    }

    function formatarTipo(tipo) {
        if (tipo === "ENTRADA") return "Entrada";
        if (tipo === "SAIDA_ALMOCO") return "Saída Almoço";
        if (tipo === "RETORNO_ALMOCO") return "Retorno";
        if (tipo === "SAIDA") return "Saída";
        return tipo || "";
    }

    async function carregarHistoricoSemana() {
        try {
            const resp = await fetch("/api/my-timesheet/week", {
                credentials: "same-origin"
            });

            const data = await resp.json();

            if (!resp.ok) {
                Toast.error(data.error || "Erro ao carregar histórico.");
                return;
            }

            const tbody = document.getElementById("historicoSemanaBody");

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state-inline">Nenhum registro na semana</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(function (item) {
                return `
                    <tr>
                        <td>${item.data || ""}</td>
                        <td>${item.entrada || "--:--"}</td>
                        <td>${item.saidaAlmoco || "--:--"}</td>
                        <td>${item.retornoAlmoco || "--:--"}</td>
                        <td>${item.saida || "--:--"}</td>
                        <td>${item.total || "--:--"}</td>
                    </tr>
                `;
            }).join("");
        } catch (e) {
            console.error(e);
            Toast.error("Erro ao carregar histórico.");
        }
    }

    async function registrarPonto() {
        try {
            const resp = await fetch("/api/my-timesheet/register", {
                method: "POST",
                credentials: "same-origin"
            });

            const data = await resp.json().catch(() => ({}));

            if (!resp.ok) {
                Toast.error(data.error || data.message || "Erro ao registrar ponto.");
                return;
            }

            Toast.success(data.message || "Ponto registrado com sucesso.");
            await carregarResumo();
            await carregarHistoricoSemana();
        } catch (e) {
            console.error(e);
            Toast.error("Erro ao registrar ponto.");
        }
    }
</script>

</body>
</html>
