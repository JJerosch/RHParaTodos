<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Meu Ponto')}"><title>Meu Ponto</title></head>

<body>
<style>
    .punch-hero {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-gray) 100%);
      color: white;
      border-radius: var(--radius-lg);
      padding: var(--spacing-8);
      text-align: center;
      margin-bottom: var(--spacing-6);
    }
    .punch-hero .current-time {
      font-size: 3.5rem;
      font-weight: 700;
      font-family: monospace;
      letter-spacing: 2px;
    }
    .punch-hero .current-date {
      opacity: 0.85;
      margin-top: var(--spacing-2);
      font-size: var(--font-size-base);
    }
    .punch-actions {
      display: flex;
      justify-content: center;
      gap: var(--spacing-4);
      margin-top: var(--spacing-6);
    }
    .punch-actions .btn {
      padding: var(--spacing-4) var(--spacing-8);
      font-size: var(--font-size-lg);
      border-radius: var(--radius-lg);
      min-width: 200px;
    }
    .btn-success {
      background: var(--success-green);
      color: white;
      border: none;
      cursor: pointer;
    }
    .btn-success:hover { opacity: 0.9; }
    .btn-success:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger {
      background: var(--error-red);
      color: white;
      border: none;
      cursor: pointer;
    }
    .btn-danger:hover { opacity: 0.9; }
    .btn-danger:disabled { opacity: 0.5; cursor: not-allowed; }
    .punch-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--spacing-4);
      margin-bottom: var(--spacing-6);
    }
    .punch-stat-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: var(--spacing-5);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-200);
      text-align: center;
    }
    .punch-stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--spacing-3);
      font-size: 20px;
    }
    .punch-stat-value {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      color: var(--primary-dark);
    }
    .punch-stat-label {
      font-size: var(--font-size-sm);
      color: var(--gray-500);
      margin-top: var(--spacing-1);
    }
    .timeline {
      position: relative;
      padding-left: 30px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 10px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--gray-200);
    }
    .timeline-item {
      position: relative;
      padding-bottom: var(--spacing-4);
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -24px;
      top: 4px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--primary-dark);
      border: 2px solid white;
    }
    .timeline-item.entrada::before { background: var(--success-green); }
    .timeline-item.saida::before { background: var(--error-red); }
    .timeline-empty {
      text-align: center;
      padding: var(--spacing-8);
      color: var(--gray-400);
    }
    .timeline-empty img {
      width: 48px;
      height: 48px;
      opacity: 0.4;
      margin-bottom: var(--spacing-3);
    }
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: var(--spacing-6);
      margin-top: var(--spacing-6);
    }
    @media (max-width: 768px) {
      .punch-hero .current-time { font-size: 2.5rem; }
      .punch-actions { flex-direction: column; align-items: center; }
      .punch-actions .btn { min-width: 100%; }
      .bottom-grid { grid-template-columns: 1fr; }
    }
</style>

<script th:inline="javascript">
    window.__CURRENT_USER__ = {
      email: /*[[${currentUser.email}]]*/ 'usuario@local',
      role:  /*[[${currentUser.role}]]*/ 'EMPLOYEE'
    };
</script>

<aside th:replace="~{fragments/sidebar :: admin('meu-ponto')}"></aside>

<div class="main-content">
    <header th:replace="~{fragments/topbar :: topbar('Meu Ponto')}"></header>

    <div class="content-area">
        <!-- Hero: Relógio + Bater Ponto -->
        <div class="punch-hero">
            <div class="current-time" id="currentTime">00:00:00</div>
            <div class="current-date" id="currentDate">Carregando...</div>
            <div class="punch-actions">
                <button class="btn btn-success" id="btnEntrada" type="button">
                    &#9654; Registrar Entrada
                </button>
                <button class="btn btn-danger" id="btnSaida" type="button" disabled>
                    &#9632; Registrar Saída
                </button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="punch-stats-grid">
            <div class="punch-stat-card">
                <div class="punch-stat-icon" style="background: rgba(40,167,69,0.1);">
                    <img th:src="@{/assets/hourglass.png}" alt="" width="24" height="24">
                </div>
                <div class="punch-stat-value" id="horasHoje">00:00</div>
                <div class="punch-stat-label">Horas Hoje</div>
            </div>
            <div class="punch-stat-card">
                <div class="punch-stat-icon" style="background: rgba(44,62,80,0.1);">
                    <img th:src="@{/assets/calendar.png}" alt="" width="24" height="24">
                </div>
                <div class="punch-stat-value" id="horasSemana">--:--</div>
                <div class="punch-stat-label">Horas na Semana</div>
            </div>
            <div class="punch-stat-card">
                <div class="punch-stat-icon" style="background: rgba(243,156,18,0.1);">
                    <img th:src="@{/assets/calendar-check.png}" alt="" width="24" height="24">
                </div>
                <div class="punch-stat-value" id="horasMes">--:--</div>
                <div class="punch-stat-label">Horas no Mês</div>
            </div>
            <div class="punch-stat-card">
                <div class="punch-stat-icon" style="background: rgba(231,76,60,0.1);">
                    <img th:src="@{/assets/scale.png}" alt="" width="24" height="24">
                </div>
                <div class="punch-stat-value" id="bancoHoras">--:--</div>
                <div class="punch-stat-label">Banco de Horas</div>
            </div>
        </div>

        <!-- Registros de Hoje + Histórico da Semana -->
        <div class="bottom-grid">
            <!-- Registros de Hoje -->
            <div class="card">
                <h3 style="margin-bottom: var(--spacing-4);">Registros de Hoje</h3>
                <div class="timeline" id="todayTimeline">
                    <div class="timeline-empty">
                        <img th:src="@{/assets/hourglass.png}" alt="">
                        <p>Nenhum registro hoje.<br>Bata seu ponto acima para começar.</p>
                    </div>
                </div>
            </div>

            <!-- Histórico da Semana -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-4);">
                    <h3>Histórico da Semana</h3>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Entrada</th>
                            <th>Saída Almoço</th>
                            <th>Retorno</th>
                            <th>Saída</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="weekHistoryBody">
                        <tr>
                            <td colspan="6" style="text-align: center; padding: var(--spacing-6); color: var(--gray-400);">
                                Nenhum registro encontrado para esta semana.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/scripts :: common}"></div>
<script>
    document.addEventListener("DOMContentLoaded", async () => {
        if (!Auth.requireAuth()) return;
        initUserMenu();
        initSidebar();
        Auth.applyRoleVisibility(document);
        Auth.applyActionVisibility(document);

        updateClock();
        setInterval(updateClock, 1000);

        bindButtons();
        await carregarResumo();
        await carregarSemana();
    });

    function bindButtons() {
        const btnEntrada = document.getElementById("btnEntrada");
        const btnSaida = document.getElementById("btnSaida");

        if (btnEntrada) btnEntrada.addEventListener("click", registrarPonto);
        if (btnSaida) btnSaida.addEventListener("click", registrarPonto);
    }

    function updateClock() {
        const now = new Date();
        const currentTime = document.getElementById("currentTime");
        const currentDate = document.getElementById("currentDate");

        if (currentTime) {
            currentTime.textContent = now.toLocaleTimeString("pt-BR");
        }

        if (currentDate) {
            currentDate.textContent = now.toLocaleDateString("pt-BR", {
                weekday: "long",
                year: "numeric",
                month: "long",
                day: "numeric"
            });
        }
    }

    async function carregarResumo() {
        try {
            const resp = await fetch("/api/my-timesheet/summary", {
                method: "GET",
                credentials: "same-origin"
            });

            const data = await resp.json();

            if (!resp.ok) {
                Toast.error(data.error || "Não foi possível carregar o resumo do ponto.");
                return;
            }

            document.getElementById("horasHoje").textContent = data.horasHoje ?? "00:00";
            document.getElementById("horasSemana").textContent = data.horasSemana ?? "00:00";
            document.getElementById("horasMes").textContent = data.horasMes ?? "00:00";
            document.getElementById("bancoHoras").textContent = data.bancoHoras ?? "+00:00";

            renderTimeline(data.marcacoesHoje || []);
            atualizarBotoes(data.proximaAcao, data.statusAtual);
        } catch (e) {
            console.error(e);
            Toast.error("Erro ao carregar dados do ponto.");
        }
    }

    async function carregarSemana() {
        try {
            const resp = await fetch("/api/my-timesheet/week", {
                method: "GET",
                credentials: "same-origin"
            });

            if (!resp.ok) {
                Toast.error("Não foi possível carregar o histórico da semana.");
                return;
            }

            const rows = await resp.json();
            const tbody = document.getElementById("weekHistoryBody");

            if (!tbody) return;

            if (!rows || !rows.length) {
                tbody.innerHTML = `
          <tr>
            <td colspan="6" style="text-align:center; padding: var(--spacing-6); color: var(--gray-400);">
              Nenhum registro encontrado para esta semana.
            </td>
          </tr>
        `;
                return;
            }

            tbody.innerHTML = rows.map(item => `
        <tr>
          <td>${item.data ?? "--/--/----"}</td>
          <td>${item.entrada ?? "--:--"}</td>
          <td>${item.saidaAlmoco ?? "--:--"}</td>
          <td>${item.retornoAlmoco ?? "--:--"}</td>
          <td>${item.saida ?? "--:--"}</td>
          <td>${item.total ?? "--:--"}</td>
        </tr>
      `).join("");
        } catch (e) {
            console.error(e);
            Toast.error("Erro ao carregar histórico da semana.");
        }
    }

    async function registrarPonto() {
        try {
            const resp = await fetch("/api/my-timesheet/punch", {
                method: "POST",
                credentials: "same-origin"
            });

            const data = await resp.json();

            if (!resp.ok) {
                Toast.error(data.error || "Não foi possível registrar o ponto.");
                return;
            }

            Toast.success((traduzirTipo(data.tipoRegistrado) || "Ponto") + " registrado com sucesso.");
            await carregarResumo();
            await carregarSemana();
        } catch (e) {
            console.error(e);
            Toast.error("Erro ao registrar o ponto.");
        }
    }

    function atualizarBotoes(proximaAcao, statusAtual) {
        const btnEntrada = document.getElementById("btnEntrada");
        const btnSaida = document.getElementById("btnSaida");

        if (!btnEntrada || !btnSaida) return;

        btnEntrada.disabled = true;
        btnSaida.disabled = true;

        btnEntrada.textContent = "▶ Registrar Entrada";
        btnSaida.textContent = "⏹ Registrar Saída";

        if (statusAtual === "FINALIZADO") {
            return;
        }

        if (proximaAcao === "ENTRADA") {
            btnEntrada.disabled = false;
            btnEntrada.textContent = "▶ Registrar Entrada";
            return;
        }

        if (proximaAcao === "SAIDA_ALMOCO") {
            btnSaida.disabled = false;
            btnSaida.textContent = "⏸ Iniciar Intervalo";
            return;
        }

        if (proximaAcao === "RETORNO_ALMOCO") {
            btnEntrada.disabled = false;
            btnEntrada.textContent = "↩ Voltar do Intervalo";
            return;
        }

        if (proximaAcao === "SAIDA") {
            btnSaida.disabled = false;
            btnSaida.textContent = "⏹ Fechar Expediente";
        }
    }

    function renderTimeline(marcacoes) {
        const timeline = document.getElementById("todayTimeline");
        if (!timeline) return;

        if (!marcacoes || !marcacoes.length) {
            timeline.innerHTML = `
        <div class="timeline-empty">
          <img src="/assets/hourglass.png" alt="">
          <p>Nenhum registro hoje.<br>Bata seu ponto acima para começar.</p>
        </div>
      `;
            return;
        }

        timeline.innerHTML = marcacoes.map(m => {
            const tipoCss = (m.tipo === "ENTRADA" || m.tipo === "RETORNO_ALMOCO") ? "entrada" : "saida";
            const label = traduzirTipo(m.tipo);
            const hora = formatHora(m.dataHora);

            return `
        <div class="timeline-item ${tipoCss}">
          <strong>${hora}</strong>
          <p style="color: var(--gray-500); font-size: var(--font-size-sm);">${label}</p>
        </div>
      `;
        }).join("");
    }

    function formatHora(dataHora) {
        if (!dataHora) return "--:--";
        const date = new Date(dataHora);
        if (isNaN(date.getTime())) return "--:--";

        return date.toLocaleTimeString("pt-BR", {
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    function traduzirTipo(tipo) {
        switch (tipo) {
            case "ENTRADA":
                return "Entrada";
            case "SAIDA_ALMOCO":
                return "Saída para almoço";
            case "RETORNO_ALMOCO":
                return "Retorno do almoço";
            case "SAIDA":
                return "Saída";
            default:
                return tipo || "";
        }
    }
</script>
</body>
</html>
