<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Cargos')}"><title>Cargos</title></head>

<body>
  <script th:inline="javascript">
    window.__CURRENT_USER__ = {
      email: /*[[${currentUser.email}]]*/ 'usuario@local',
      role:  /*[[${currentUser.role}]]*/ 'EMPLOYEE'
    };
  </script>

  <aside th:replace="~{fragments/sidebar :: admin('positions')}"></aside>

  <div class="main-content">
    <header th:replace="~{fragments/topbar :: topbar('Cargos')}"></header>

    <div class="content-area">
      <div class="page-header">
        <div>
          <h2 class="page-title">Cargos por Departamento</h2>
          <p class="page-subtitle">Estrutura organizacional com cargos, salários e ocupação</p>
        </div>
        <div class="page-actions" data-action-roles="ADMIN,RH_CHEFE,RH_ASSISTENTE">
          <button class="btn btn-primary" onclick="openCreateModal()">+ Solicitar Novo Cargo</button>
        </div>
      </div>

      <div id="accordionContainer">
        <div style="text-align: center; padding: var(--spacing-6); color: var(--gray-400);">Carregando...</div>
      </div>
    </div>
  </div>

  <!-- Modal: Solicitar Criação/Edição de Cargo -->
  <div class="modal" id="modal">
    <div class="modal-dialog modal-md">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Solicitar Novo Cargo</h3>
        <button class="modal-close" onclick="Modal.close('modal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="form">
          <input type="hidden" name="id">
          <div class="form-row form-row-2">
            <div class="form-group">
              <label class="form-label">Título do Cargo *</label>
              <input type="text" class="form-input" name="titulo" required>
            </div>
            <div class="form-group">
              <label class="form-label">Departamento *</label>
              <select class="form-select" name="departamentoId" id="formDeptSelect" required>
                <option value="">Selecione</option>
              </select>
            </div>
          </div>
          <div class="form-row form-row-3">
            <div class="form-group">
              <label class="form-label">Nível</label>
              <select class="form-select" name="nivel">
                <option value="">Selecione</option>
                <option value="JUNIOR">Junior</option>
                <option value="PLENO">Pleno</option>
                <option value="SENIOR">Senior</option>
                <option value="GESTAO">Gestão</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Salário Mínimo</label>
              <input type="text" class="form-input" name="salarioMinimo" data-mask="currency">
            </div>
            <div class="form-group">
              <label class="form-label">Salário Máximo</label>
              <input type="text" class="form-input" name="salarioMaximo" data-mask="currency">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Descrição</label>
            <textarea class="form-input" name="descricao" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Motivo *</label>
            <input type="text" class="form-input" name="motivo" required placeholder="Justificativa da solicitação">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('modal')">Cancelar</button>
        <button class="btn btn-primary" onclick="save()">Criar Solicitação</button>
      </div>
    </div>
  </div>

  <!-- Modal: Solicitar Ação sobre Cargo -->
  <div class="modal" id="actionModal">
    <div class="modal-dialog modal-sm">
      <div class="modal-header">
        <h3 class="modal-title" id="actionTitle">Solicitar Ação</h3>
        <button class="modal-close" onclick="Modal.close('actionModal')">&times;</button>
      </div>
      <div class="modal-body">
        <p style="text-align: center; margin: var(--spacing-4) 0;" id="actionMsg"></p>
        <div class="form-group" style="margin-top: var(--spacing-4);">
          <label class="form-label">Motivo *</label>
          <textarea class="form-input" id="actionMotivo" rows="2" placeholder="Informe o motivo..." required></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('actionModal')">Cancelar</button>
        <button class="btn btn-primary" id="actionConfirmBtn" onclick="confirmAction()">Enviar Solicitação</button>
      </div>
    </div>
  </div>

  <style>
    .accordion-item {
      background: white;
      border-radius: var(--radius-lg);
      margin-bottom: var(--spacing-3);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-200);
      overflow: hidden;
    }
    .accordion-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacing-4) var(--spacing-5);
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }
    .accordion-header:hover { background: var(--gray-50); }
    .accordion-header-left {
      display: flex;
      align-items: center;
      gap: var(--spacing-3);
    }
    .accordion-arrow {
      transition: transform 0.2s;
      font-size: 12px;
      color: var(--gray-400);
    }
    .accordion-item.open .accordion-arrow { transform: rotate(90deg); }
    .accordion-dept-name {
      font-size: var(--font-size-lg);
      font-weight: 600;
      color: var(--gray-800);
    }
    .accordion-count {
      font-size: var(--font-size-sm);
      color: var(--gray-500);
      background: var(--gray-100);
      padding: var(--spacing-1) var(--spacing-3);
      border-radius: var(--radius-full);
    }
    .accordion-body {
      display: none;
      padding: 0 var(--spacing-5) var(--spacing-5);
    }
    .accordion-item.open .accordion-body { display: block; }

    .cargo-card {
      background: var(--gray-50);
      border-radius: var(--radius-md);
      padding: var(--spacing-4);
      margin-bottom: var(--spacing-3);
      border: 1px solid var(--gray-100);
    }
    .cargo-card:last-child { margin-bottom: 0; }
    .cargo-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--spacing-3);
    }
    .cargo-card-title {
      font-weight: 600;
      color: var(--primary-dark);
      font-size: var(--font-size-base);
    }
    .cargo-card-meta {
      display: flex;
      gap: var(--spacing-4);
      flex-wrap: wrap;
      font-size: var(--font-size-sm);
      color: var(--gray-600);
      margin-bottom: var(--spacing-3);
    }
    .cargo-card-meta span { display: flex; align-items: center; gap: var(--spacing-1); }
    .cargo-card-actions {
      display: flex;
      gap: var(--spacing-2);
      flex-wrap: wrap;
    }
    .cargo-card-actions button {
      padding: 0.25rem 0.6rem;
      font-size: var(--font-size-xs);
      border-radius: var(--radius-sm);
      border: 1px solid var(--gray-300);
      background: white;
      cursor: pointer;
      transition: all 0.15s;
    }
    .cargo-card-actions button:hover { border-color: var(--primary-dark); color: var(--primary-dark); }
    .cargo-card-actions .btn-danger-outline:hover { border-color: var(--error-red); color: var(--error-red); }

    .func-row {
      display: grid;
      grid-template-columns: 1fr 120px 100px;
      gap: var(--spacing-2);
      padding: var(--spacing-2) 0;
      font-size: var(--font-size-sm);
      border-bottom: 1px solid var(--gray-100);
      align-items: center;
    }
    .func-row:last-child { border-bottom: none; }
    .func-name { color: var(--gray-800); font-weight: 500; }
    .func-salary { color: var(--gray-600); text-align: right; }
    .func-date { color: var(--gray-500); text-align: right; }
    .cargo-empty {
      font-size: var(--font-size-sm);
      color: var(--gray-400);
      font-style: italic;
      padding: var(--spacing-2) 0;
    }
    @media (max-width: 768px) {
      .func-row { grid-template-columns: 1fr; gap: 0; }
      .func-salary, .func-date { text-align: left; font-size: var(--font-size-xs); }
      .cargo-card-meta { flex-direction: column; gap: var(--spacing-1); }
    }
  </style>

  <div th:replace="~{fragments/scripts :: common}"></div>
  <script>
    const API = '/api/positions';
    let departamentos = [];
    let allData = [];
    let currentId = null;
    let editingCargo = null; // snapshot para edição

    const userRole = window.__CURRENT_USER__.role;
    const canWrite = ['ADMIN', 'RH_CHEFE', 'RH_ASSISTENTE'].includes(userRole);
    const nivelLabels = { JUNIOR: 'Júnior', PLENO: 'Pleno', SENIOR: 'Sênior', GESTAO: 'Gestão' };

    async function api(url, opts = {}) {
      const res = await fetch(url, { credentials: 'same-origin', headers: { 'Content-Type': 'application/json', ...opts.headers }, ...opts });
      if (res.status === 401) { window.location.href = '/login'; return; }
      if (res.status === 204) return null;
      const body = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(body.error || 'Erro na requisição');
      return body;
    }

    document.addEventListener("DOMContentLoaded", () => {
      if (!Auth.requireAuth()) return;
      initUserMenu();
      initSidebar();
      Auth.applyRoleVisibility(document);
      Auth.applyActionVisibility(document);
      loadData();
      Mask.initAll();
    });

    async function loadData() {
      try {
        const [byDeptRes, deptRes] = await Promise.all([
          fetch(API + '/by-department', { credentials: 'same-origin' }),
          fetch(API + '/departamentos', { credentials: 'same-origin' })
        ]);
        if (!byDeptRes.ok) throw new Error('API indisponível');
        allData = await byDeptRes.json();
        departamentos = await deptRes.json();
      } catch (e) {
        console.error('Erro ao carregar dados:', e);
        allData = [];
        departamentos = [];
      }
      populateDeptDropdown();
      render();
    }

    function populateDeptDropdown() {
      const formSelect = document.getElementById("formDeptSelect");
      formSelect.innerHTML = '<option value="">Selecione</option>';
      departamentos.forEach(d => {
        formSelect.innerHTML += '<option value="' + d.id + '">' + d.nome + '</option>';
      });
    }

    function formatCurrency(val) {
      if (val == null) return '-';
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
    }

    function formatDate(d) {
      if (!d) return '-';
      return new Date(d + 'T00:00:00').toLocaleDateString('pt-BR');
    }

    function render() {
      const container = document.getElementById("accordionContainer");
      if (allData.length === 0) {
        container.innerHTML = '<div class="empty-state"><h3 class="empty-state-title">Nenhum departamento encontrado</h3></div>';
        return;
      }

      container.innerHTML = allData.map((dept, i) => {
        const cargosHtml = dept.cargos.map(cargo => {
          const funcsHtml = cargo.funcionarios.length > 0
            ? cargo.funcionarios.map(f => `
                <div class="func-row">
                  <span class="func-name">${f.nome}</span>
                  <span class="func-salary">${formatCurrency(f.salario)}</span>
                  <span class="func-date">${formatDate(f.dataAdmissao)}</span>
                </div>
              `).join('')
            : '<div class="cargo-empty">Nenhum funcionário neste cargo</div>';

          const salarioRange = (cargo.salarioMinimo || cargo.salarioMaximo)
            ? formatCurrency(cargo.salarioMinimo) + ' - ' + formatCurrency(cargo.salarioMaximo)
            : 'Não definido';

          const statusBadge = cargo.ativo !== false
            ? '<span class="badge badge-success">Ativo</span>'
            : '<span class="badge badge-danger">Inativo</span>';

          const hasOccupants = cargo.funcionarios.length > 0;
          const beneficiosHtml = (cargo.beneficios && cargo.beneficios.length > 0)
            ? '<div style="margin-top:var(--spacing-2);display:flex;gap:var(--spacing-1);flex-wrap:wrap;">' + cargo.beneficios.map(b => '<span class="badge badge-info" style="font-size:var(--font-size-xs);">' + b + '</span>').join('') + '</div>'
            : '';
          const actionsHtml = canWrite && cargo.id ? `
            <div class="cargo-card-actions">
              ${hasOccupants ? `
                <button onclick="event.stopPropagation(); openEditModal(${cargo.id}, '${dept.nome}')">Alterar</button>
                <button class="btn-danger-outline" onclick="event.stopPropagation(); requestAction(${cargo.id}, '${cargo.titulo}', 'EXCLUSAO_CARGO', 'exclusão permanente')">Excluir</button>
              ` : `
                <button onclick="event.stopPropagation(); openEditModal(${cargo.id}, '${dept.nome}')">Editar</button>
                <button style="border-color: var(--success-green); color: var(--success-green);" onclick="event.stopPropagation(); requestAction(${cargo.id}, '${cargo.titulo}', 'ABERTURA_VAGA', 'abertura de vaga')">Abrir Vaga</button>
                <button class="btn-danger-outline" onclick="event.stopPropagation(); requestAction(${cargo.id}, '${cargo.titulo}', 'EXCLUSAO_CARGO', 'exclusão permanente')">Excluir</button>
              `}
            </div>
          ` : '';

          return `
            <div class="cargo-card">
              <div class="cargo-card-header">
                <div>
                  <span class="cargo-card-title">${cargo.titulo}</span>
                  ${statusBadge}
                </div>
              </div>
              <div class="cargo-card-meta">
                <span><strong>Nível:</strong> ${nivelLabels[cargo.nivel] || cargo.nivel || '-'}</span>
                <span><strong>Faixa:</strong> ${salarioRange}</span>
                <span><strong>Ocupantes:</strong> ${cargo.funcionarios.length}</span>
              </div>
              ${funcsHtml}
              ${beneficiosHtml}
              ${actionsHtml}
            </div>
          `;
        }).join('');

        return `
          <div class="accordion-item" id="acc-${i}">
            <div class="accordion-header" onclick="toggleAccordion(${i})">
              <div class="accordion-header-left">
                <span class="accordion-arrow">&#9654;</span>
                <span class="accordion-dept-name">${dept.nome}</span>
              </div>
              <span class="accordion-count">${dept.cargos.length} cargo(s) &bull; ${dept.totalFuncionarios} funcionário(s)</span>
            </div>
            <div class="accordion-body">
              ${dept.cargos.length > 0 ? cargosHtml : '<div class="cargo-empty">Nenhum cargo cadastrado neste departamento</div>'}
            </div>
          </div>
        `;
      }).join('');
    }

    function toggleAccordion(index) {
      document.getElementById('acc-' + index).classList.toggle('open');
    }

    // ── Criar novo cargo (via solicitação) ──
    function openCreateModal() {
      currentId = null;
      editingCargo = null;
      document.getElementById("form").reset();
      document.getElementById("modalTitle").textContent = "Solicitar Novo Cargo";
      Modal.open('modal');
      Mask.initAll();
    }

    // ── Editar cargo (via solicitação) ──
    async function openEditModal(cargoId, deptNome) {
      try {
        const cargo = await api(API + '/' + cargoId);
        if (!cargo) return;
        currentId = cargoId;
        editingCargo = cargo;
        document.getElementById("form").reset();
        document.getElementById("modalTitle").textContent = "Solicitar Edição de Cargo";
        Form.populate('form', cargo);
        Modal.open('modal');
        Mask.initAll();
      } catch (e) {
        Toast.error('Erro ao carregar cargo');
      }
    }

    async function save() {
      const formData = Form.serialize('form');
      if (!formData.titulo || !formData.departamentoId) {
        Toast.error('Preencha os campos obrigatórios');
        return;
      }
      if (!formData.motivo) {
        Toast.error('Informe o motivo da solicitação');
        return;
      }

      const dadosDepois = {
        titulo: formData.titulo,
        descricao: formData.descricao || null,
        nivel: formData.nivel || null,
        departamentoId: Number(formData.departamentoId),
        salarioMinimo: formData.salarioMinimo ? parseFloat(String(formData.salarioMinimo).replace(/[^\d,]/g, '').replace(',', '.')) : null,
        salarioMaximo: formData.salarioMaximo ? parseFloat(String(formData.salarioMaximo).replace(/[^\d,]/g, '').replace(',', '.')) : null
      };

      let tipo, dadosAntes = null, referenciaId = null;

      if (currentId) {
        tipo = 'EDICAO_CARGO';
        referenciaId = currentId;
        if (editingCargo) {
          dadosAntes = {
            titulo: editingCargo.titulo,
            descricao: editingCargo.descricao,
            nivel: editingCargo.nivel,
            departamentoId: editingCargo.departamentoId,
            salarioMinimo: editingCargo.salarioMinimo,
            salarioMaximo: editingCargo.salarioMaximo
          };
        }
      } else {
        tipo = 'CRIACAO_CARGO';
      }

      try {
        await api('/api/solicitacoes', {
          method: 'POST',
          body: JSON.stringify({
            tipo: tipo,
            referenciaTipo: 'CARGO',
            referenciaId: referenciaId,
            motivo: formData.motivo,
            dadosAntes: dadosAntes ? JSON.stringify(dadosAntes) : null,
            dadosDepois: JSON.stringify(dadosDepois)
          })
        });
        Toast.success('Solicitação criada! Aguarde aprovação.');
        Modal.close('modal');
      } catch (e) {
        Toast.error(e.message || 'Erro ao criar solicitação');
      }
    }

    // ── Ações genéricas sobre cargo (desativar, excluir, abrir vaga) ──
    let actionTargetId = null;
    let actionType = null;

    function requestAction(cargoId, cargoTitulo, tipo, descricaoAcao) {
      actionTargetId = cargoId;
      actionType = tipo;
      document.getElementById("actionTitle").textContent = 'Solicitar ' + descricaoAcao.charAt(0).toUpperCase() + descricaoAcao.slice(1);
      document.getElementById("actionMsg").innerHTML = 'Deseja solicitar a <strong>' + descricaoAcao + '</strong> do cargo <strong>' + cargoTitulo + '</strong>?';
      document.getElementById("actionMotivo").value = '';

      const btn = document.getElementById("actionConfirmBtn");
      if (tipo === 'EXCLUSAO_CARGO') {
        btn.style.background = 'var(--error-red)';
        btn.style.color = 'white';
        btn.className = 'btn';
      } else if (tipo === 'ABERTURA_VAGA') {
        btn.style.background = 'var(--success-green)';
        btn.style.color = 'white';
        btn.className = 'btn';
      } else {
        btn.style.background = '';
        btn.style.color = '';
        btn.className = 'btn btn-primary';
      }

      Modal.open('actionModal');
    }

    async function confirmAction() {
      const motivo = document.getElementById("actionMotivo").value.trim();
      if (!motivo) {
        Toast.error('Informe o motivo');
        document.getElementById("actionMotivo").focus();
        return;
      }
      try {
        await api('/api/solicitacoes', {
          method: 'POST',
          body: JSON.stringify({
            tipo: actionType,
            referenciaTipo: actionType === 'ABERTURA_VAGA' ? 'VAGA' : 'CARGO',
            referenciaId: actionTargetId,
            motivo: motivo
          })
        });
        Toast.success('Solicitação criada! Aguarde aprovação.');
        Modal.close('actionModal');
      } catch (e) {
        Toast.error(e.message || 'Erro ao criar solicitação');
      }
    }
  </script>
</body>

</html>
