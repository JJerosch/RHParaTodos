<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Cargos')}"><title>Cargos</title></head>

<body>
  <script th:inline="javascript">
    window.__CURRENT_USER__ = {
      email: /*[[${currentUser.email}]]*/ 'usuario@local',
      role:  /*[[${currentUser.role}]]*/ 'EMPLOYEE'
    };
  </script>

  <aside th:replace="~{fragments/sidebar :: admin('positions')}"></aside>

  <div class="main-content">
    <header th:replace="~{fragments/topbar :: topbar('Cargos')}"></header>

    <div class="content-area">
      <div class="page-header">
        <div>
          <h2 class="page-title">Quadro de Lota&#231;&#227;o</h2>
          <p class="page-subtitle">Estrutura organizacional com vagas, status e a&#231;&#245;es</p>
        </div>
        <div class="page-actions" data-action-roles="ADMIN,RH_CHEFE,RH_ASSISTENTE">
          <button class="btn btn-primary" onclick="openCreateModal()">+ Solicitar Novo Cargo</button>
        </div>
      </div>

      <div id="accordionContainer">
        <div style="text-align: center; padding: var(--spacing-6); color: var(--gray-400);">Carregando...</div>
      </div>
    </div>
  </div>

  <!-- Modal: Solicitar Criacao/Edicao de Cargo -->
  <div class="modal" id="modal">
    <div class="modal-dialog modal-md">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Solicitar Novo Cargo</h3>
        <button class="modal-close" onclick="Modal.close('modal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="form">
          <input type="hidden" name="id">
          <div class="form-row form-row-2">
            <div class="form-group">
              <label class="form-label">T&#237;tulo do Cargo *</label>
              <input type="text" class="form-input" name="titulo" required>
            </div>
            <div class="form-group">
              <label class="form-label">Departamento *</label>
              <select class="form-select" name="departamentoId" id="formDeptSelect" required>
                <option value="">Selecione</option>
              </select>
            </div>
          </div>
          <div class="form-row form-row-3">
            <div class="form-group">
              <label class="form-label">N&#237;vel</label>
              <select class="form-select" name="nivel">
                <option value="">Selecione</option>
                <option value="JUNIOR">Junior</option>
                <option value="PLENO">Pleno</option>
                <option value="SENIOR">Senior</option>
                <option value="GESTAO">Gest&#227;o</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Sal&#225;rio M&#237;nimo</label>
              <input type="text" class="form-input" name="salarioMinimo" data-mask="currency">
            </div>
            <div class="form-group">
              <label class="form-label">Sal&#225;rio M&#225;ximo</label>
              <input type="text" class="form-input" name="salarioMaximo" data-mask="currency">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Descri&#231;&#227;o</label>
            <textarea class="form-input" name="descricao" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Motivo *</label>
            <input type="text" class="form-input" name="motivo" required placeholder="Justificativa da solicitação">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('modal')">Cancelar</button>
        <button class="btn btn-primary" onclick="save()">Criar Solicita&#231;&#227;o</button>
      </div>
    </div>
  </div>

  <!-- Modal: Solicitar Acao sobre Cargo -->
  <div class="modal" id="actionModal">
    <div class="modal-dialog modal-sm">
      <div class="modal-header">
        <h3 class="modal-title" id="actionTitle">Solicitar A&#231;&#227;o</h3>
        <button class="modal-close" onclick="Modal.close('actionModal')">&times;</button>
      </div>
      <div class="modal-body">
        <p style="text-align: center; margin: var(--spacing-4) 0;" id="actionMsg"></p>
        <div class="form-group" style="margin-top: var(--spacing-4);">
          <label class="form-label">Motivo *</label>
          <textarea class="form-input" id="actionMotivo" rows="2" placeholder="Informe o motivo..." required></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('actionModal')">Cancelar</button>
        <button class="btn btn-primary" id="actionConfirmBtn" onclick="confirmAction()">Enviar Solicita&#231;&#227;o</button>
      </div>
    </div>
  </div>

  <!-- Modal: Solicitar Abertura de Vaga -->
  <div class="modal" id="vagaModal">
    <div class="modal-dialog modal-md">
      <div class="modal-header">
        <h3 class="modal-title">Solicitar Abertura de Vaga</h3>
        <button class="modal-close" onclick="Modal.close('vagaModal')">&times;</button>
      </div>
      <div class="modal-body">
        <p id="vagaMsg" style="text-align: center; margin-bottom: var(--spacing-4);"></p>
        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">T&#237;tulo da Vaga *</label>
            <input type="text" class="form-input" id="vagaTitulo" placeholder="T&#237;tulo da vaga" required>
          </div>
          <div class="form-group">
            <label class="form-label">Quantidade *</label>
            <input type="number" class="form-input" id="vagaQuantidade" value="1" min="1">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Descri&#231;&#227;o</label>
          <textarea class="form-input" id="vagaDescricao" rows="2" placeholder="Descri&#231;&#227;o da vaga..."></textarea>
        </div>
        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">Prioridade</label>
            <select class="form-select" id="vagaPrioridade">
              <option value="BAIXA">Baixa</option>
              <option value="MEDIA" selected>M&#233;dia</option>
              <option value="ALTA">Alta</option>
              <option value="URGENTE">Urgente</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Tipo de Contrato</label>
            <select class="form-select" id="vagaTipoContrato">
              <option value="CLT" selected>CLT</option>
              <option value="PJ">PJ</option>
              <option value="ESTAGIO">Est&#225;gio</option>
              <option value="TEMPORARIO">Tempor&#225;rio</option>
            </select>
          </div>
        </div>
        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">Modelo de Trabalho</label>
            <select class="form-select" id="vagaModeloTrabalho">
              <option value="PRESENCIAL" selected>Presencial</option>
              <option value="HIBRIDO">H&#237;brido</option>
              <option value="REMOTO">Remoto</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Local de Trabalho</label>
            <input type="text" class="form-input" id="vagaLocalTrabalho" placeholder="Cidade / Escrit&#243;rio">
          </div>
        </div>
        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">Sal&#225;rio M&#237;nimo</label>
            <input type="text" class="form-input" id="vagaSalarioMin" data-mask="currency">
          </div>
          <div class="form-group">
            <label class="form-label">Sal&#225;rio M&#225;ximo</label>
            <input type="text" class="form-input" id="vagaSalarioMax" data-mask="currency">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Requisitos</label>
          <textarea class="form-input" id="vagaRequisitos" rows="2" placeholder="Requisitos da vaga..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Motivo *</label>
          <textarea class="form-input" id="vagaMotivo" rows="2" placeholder="Informe o motivo da solicita&#231;&#227;o..." required></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('vagaModal')">Cancelar</button>
        <button class="btn btn-primary" style="background: var(--success-green); color: white;" onclick="confirmVaga()">Enviar Solicita&#231;&#227;o</button>
      </div>
    </div>
  </div>

  <!-- Modal: Solicitar Promoção -->
  <div class="modal" id="promoModal">
    <div class="modal-dialog modal-md">
      <div class="modal-header">
        <h3 class="modal-title">Solicitar Promo&#231;&#227;o</h3>
        <button class="modal-close" onclick="Modal.close('promoModal')">&times;</button>
      </div>
      <div class="modal-body">
        <p id="promoMsg" style="text-align: center; margin-bottom: var(--spacing-4);"></p>
        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">Novo Departamento *</label>
            <select class="form-select" id="promoDeptSelect" onchange="filterPromoCargos()">
              <option value="">Selecione</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Novo Cargo *</label>
            <select class="form-select" id="promoCargoSelect">
              <option value="">Selecione o departamento primeiro</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Motivo *</label>
          <textarea class="form-input" id="promoMotivo" rows="2" placeholder="Informe o motivo da promo&#231;&#227;o..." required></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('promoModal')">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmPromotion()">Enviar Solicita&#231;&#227;o</button>
      </div>
    </div>
  </div>

  <style>
    /* ── Accordion ── */
    .accordion-item {
      background: white;
      border-radius: var(--radius-lg);
      margin-bottom: var(--spacing-3);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-200);
      overflow: hidden;
    }
    .accordion-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacing-4) var(--spacing-5);
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }
    .accordion-header:hover { background: var(--gray-50); }
    .accordion-header-left {
      display: flex;
      align-items: center;
      gap: var(--spacing-3);
    }
    .accordion-arrow {
      transition: transform 0.25s;
      font-size: 14px;
      color: var(--gray-500);
      display: inline-flex;
    }
    .accordion-item.open .accordion-arrow { transform: rotate(90deg); }
    .accordion-dept-name {
      font-size: var(--font-size-lg);
      font-weight: 600;
      color: var(--gray-800);
    }
    .accordion-count {
      font-size: var(--font-size-sm);
      color: var(--gray-500);
      display: flex;
      align-items: center;
      gap: var(--spacing-2);
    }
    .accordion-count-icon { font-size: 16px; }
    .accordion-body {
      display: none;
      padding: 0 var(--spacing-5) var(--spacing-5);
    }
    .accordion-item.open .accordion-body { display: block; }

    /* ── Cargo card (vaga style) ── */
    .vaga-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-4);
      padding: var(--spacing-4) var(--spacing-5);
      border-left: 3px solid var(--gray-300);
      background: var(--gray-50);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      margin-bottom: var(--spacing-3);
    }
    .vaga-card:last-child { margin-bottom: 0; }
    .vaga-card.preenchido { border-left-color: var(--success-green); }
    .vaga-card.vago { border-left-color: var(--gray-400); }

    .vaga-info { flex: 1; min-width: 0; }
    .vaga-titulo {
      font-weight: 600;
      font-size: var(--font-size-base);
      color: var(--gray-800);
      margin-bottom: 2px;
    }
    .vaga-sub {
      font-size: var(--font-size-sm);
      color: var(--gray-500);
    }

    .vaga-status { flex-shrink: 0; }
    .badge-preenchido {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #e6f4ea;
      color: #1a7f37;
      font-size: var(--font-size-xs);
      font-weight: 600;
      padding: 3px 10px;
      border-radius: var(--radius-full);
    }
    .badge-vago {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--gray-100);
      color: var(--gray-600);
      font-size: var(--font-size-xs);
      font-weight: 600;
      padding: 3px 10px;
      border-radius: var(--radius-full);
    }

    .vaga-actions {
      display: flex;
      gap: var(--spacing-2);
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .vaga-actions .act-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      font-size: var(--font-size-xs);
      font-weight: 500;
      border-radius: var(--radius-sm);
      border: 1px solid var(--gray-300);
      background: white;
      color: var(--gray-700);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .vaga-actions .act-btn:hover { border-color: var(--primary-dark); color: var(--primary-dark); }
    .vaga-actions .act-btn.btn-vaga {
      border-color: var(--success-green);
      color: var(--success-green);
      background: #f0faf3;
    }
    .vaga-actions .act-btn.btn-vaga:hover { background: #e0f5e7; }
    .vaga-actions .act-btn.btn-danger { border-color: var(--error-red); color: var(--error-red); }
    .vaga-actions .act-btn.btn-danger:hover { background: #fef2f2; }
    .vaga-actions .act-btn.btn-promo { border-color: #6366f1; color: #6366f1; }
    .vaga-actions .act-btn.btn-promo:hover { background: #f0f0ff; }

    .cargo-empty {
      font-size: var(--font-size-sm);
      color: var(--gray-400);
      font-style: italic;
      padding: var(--spacing-3) var(--spacing-5);
      text-align: center;
    }

    @media (max-width: 900px) {
      .vaga-card { flex-direction: column; align-items: flex-start; }
      .vaga-actions { width: 100%; justify-content: flex-start; margin-top: var(--spacing-2); }
    }
  </style>

  <div th:replace="~{fragments/scripts :: common}"></div>
  <script>
    const API = '/api/positions';
    let departamentos = [];
    let allData = [];
    let currentId = null;
    let editingCargo = null;

    const userRole = window.__CURRENT_USER__.role;
    const canWrite = ['ADMIN', 'RH_CHEFE', 'RH_ASSISTENTE'].includes(userRole);

    async function api(url, opts = {}) {
      const res = await fetch(url, { credentials: 'same-origin', headers: { 'Content-Type': 'application/json', ...opts.headers }, ...opts });
      if (res.status === 401) { window.location.href = '/login'; return; }
      if (res.status === 204) return null;
      const body = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(body.error || 'Erro na requisição');
      return body;
    }

    document.addEventListener("DOMContentLoaded", () => {
      if (!Auth.requireAuth()) return;
      initUserMenu();
      initSidebar();
      Auth.applyRoleVisibility(document);
      Auth.applyActionVisibility(document);
      loadData();
      Mask.initAll();
    });

    async function loadData() {
      try {
        const [byDeptRes, deptRes] = await Promise.all([
          api(API + '/by-department'),
          api(API + '/departamentos')
        ]);
        allData = byDeptRes || [];
        departamentos = deptRes || [];
      } catch (e) {
        console.error('Erro ao carregar dados:', e);
        allData = [];
        departamentos = [];
      }
      populateDeptDropdown();
      render();
    }

    function populateDeptDropdown() {
      const sel = document.getElementById("formDeptSelect");
      sel.innerHTML = '<option value="">Selecione</option>';
      departamentos.forEach(function(d) {
        var opt = document.createElement('option');
        opt.value = d.id;
        opt.textContent = d.nome;
        sel.appendChild(opt);
      });
    }

    function formatCurrency(val) {
      if (val == null) return '-';
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
    }

    function formatDate(d) {
      if (!d) return '-';
      return new Date(d + 'T00:00:00').toLocaleDateString('pt-BR');
    }

    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function render() {
      var container = document.getElementById("accordionContainer");
      if (allData.length === 0) {
        container.innerHTML = '<div class="empty-state"><h3 class="empty-state-title">Nenhum departamento encontrado</h3></div>';
        return;
      }

      container.innerHTML = allData.map(function(dept, i) {
        var totalCargos = dept.cargos.length;
        var preenchidos = dept.cargos.filter(function(c) { return c.funcionarios && c.funcionarios.length > 0; }).length;

        var cargosHtml = dept.cargos.map(function(cargo) {
          var filled = cargo.funcionarios && cargo.funcionarios.length > 0;
          var cardClass = filled ? 'preenchido' : 'vago';

          var statusBadge = filled
            ? '<span class="badge-preenchido">&#9632; Preenchido</span>'
            : '<span class="badge-vago">&#9632; Vago</span>';

          var subText = '';
          if (filled) {
            var nomes = cargo.funcionarios.map(function(f) { return esc(f.nome); });
            subText = 'Titular: ' + nomes.join(', ');
          } else {
            subText = 'Cargo sem ocupante';
          }

          var beneficiosHtml = '';
          if (cargo.beneficios && cargo.beneficios.length > 0) {
            beneficiosHtml = '<div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap;">' +
              cargo.beneficios.map(function(nome) {
                return '<span style="display:inline-block;background:#e8f0fe;color:#1a73e8;font-size:11px;padding:1px 8px;border-radius:10px;">' + esc(nome) + '</span>';
              }).join('') + '</div>';
          }

          var actionsHtml = '';
          if (canWrite && cargo.id) {
            if (filled) {
              var funcId = cargo.funcionarios[0].id;
              var funcNome = esc(cargo.funcionarios[0].nome);
              actionsHtml =
                '<div class="vaga-actions">' +
                  '<button class="act-btn" onclick="event.stopPropagation(); openEditModal(' + cargo.id + ')">&#9998; Solicitar Altera\u00e7\u00e3o</button>' +
                  '<button class="act-btn btn-danger" onclick="event.stopPropagation(); requestAction(' + cargo.id + ', \'' + esc(cargo.titulo) + '\', \'EXCLUSAO_CARGO\', \'exclus\u00e3o\')">&#128465; Solicitar Exclus\u00e3o</button>' +
                  '<button class="act-btn btn-danger" onclick="event.stopPropagation(); requestDemissao(' + funcId + ', \'' + funcNome + '\', ' + cargo.id + ')">&#10005; Solicitar Demiss\u00e3o</button>' +
                  '<button class="act-btn btn-promo" onclick="event.stopPropagation(); openPromoModal(' + cargo.id + ')">&#9733; Promo\u00e7\u00e3o</button>' +
                '</div>';
            } else {
              actionsHtml =
                '<div class="vaga-actions">' +
                  '<button class="act-btn btn-vaga" onclick="event.stopPropagation(); openVagaModal(' + cargo.id + ', \'' + esc(cargo.titulo) + '\', ' + dept.id + ')">+ Solicitar Abertura de Vaga</button>' +
                '</div>';
            }
          }

          return (
            '<div class="vaga-card ' + cardClass + '">' +
              '<div class="vaga-info">' +
                '<div class="vaga-titulo">Vaga: ' + esc(cargo.titulo) + '</div>' +
                '<div class="vaga-sub">' + subText + '</div>' +
                beneficiosHtml +
              '</div>' +
              '<div class="vaga-status">' + statusBadge + '</div>' +
              actionsHtml +
            '</div>'
          );
        }).join('');

        return (
          '<div class="accordion-item' + (i === 0 ? ' open' : '') + '" id="acc-' + i + '">' +
            '<div class="accordion-header" onclick="toggleAccordion(' + i + ')">' +
              '<div class="accordion-header-left">' +
                '<span class="accordion-arrow">&#9654;</span>' +
                '<span class="accordion-dept-name">' + esc(dept.nome) + '</span>' +
              '</div>' +
              '<span class="accordion-count"><span class="accordion-count-icon">&#128196;</span> ' + preenchidos + '/' + totalCargos + ' Vagas</span>' +
            '</div>' +
            '<div class="accordion-body">' +
              (totalCargos > 0 ? cargosHtml : '<div class="cargo-empty">Nenhum cargo cadastrado neste departamento</div>') +
            '</div>' +
          '</div>'
        );
      }).join('');
    }

    function toggleAccordion(index) {
      document.getElementById('acc-' + index).classList.toggle('open');
    }

    /* ── Criar novo cargo (via solicitacao) ── */
    function openCreateModal() {
      currentId = null;
      editingCargo = null;
      document.getElementById("form").reset();
      document.getElementById("modalTitle").textContent = "Solicitar Novo Cargo";
      Modal.open('modal');
      Mask.initAll();
    }

    /* ── Editar cargo (via solicitacao) ── */
    async function openEditModal(cargoId) {
      try {
        var cargo = await api(API + '/' + cargoId);
        if (!cargo) return;
        currentId = cargoId;
        editingCargo = cargo;
        document.getElementById("form").reset();
        document.getElementById("modalTitle").textContent = "Solicitar Edi\u00e7\u00e3o de Cargo";
        Form.populate('form', cargo);
        Modal.open('modal');
        Mask.initAll();
      } catch (e) {
        Toast.error('Erro ao carregar cargo');
      }
    }

    async function save() {
      var formData = Form.serialize('form');
      if (!formData.titulo || !formData.departamentoId) {
        Toast.error('Preencha os campos obrigatórios');
        return;
      }
      if (!formData.motivo) {
        Toast.error('Informe o motivo da solicitação');
        return;
      }

      var dadosDepois = {
        titulo: formData.titulo,
        descricao: formData.descricao || null,
        nivel: formData.nivel || null,
        departamentoId: Number(formData.departamentoId),
        salarioMinimo: formData.salarioMinimo ? parseFloat(String(formData.salarioMinimo).replace(/[^\d,]/g, '').replace(',', '.')) : null,
        salarioMaximo: formData.salarioMaximo ? parseFloat(String(formData.salarioMaximo).replace(/[^\d,]/g, '').replace(',', '.')) : null
      };

      var tipo, dadosAntes = null, referenciaId = null;

      if (currentId) {
        tipo = 'EDICAO_CARGO';
        referenciaId = currentId;
        if (editingCargo) {
          dadosAntes = {
            titulo: editingCargo.titulo,
            descricao: editingCargo.descricao,
            nivel: editingCargo.nivel,
            departamentoId: editingCargo.departamentoId,
            salarioMinimo: editingCargo.salarioMinimo,
            salarioMaximo: editingCargo.salarioMaximo
          };
        }
      } else {
        tipo = 'CRIACAO_CARGO';
      }

      try {
        await api('/api/solicitacoes', {
          method: 'POST',
          body: JSON.stringify({
            tipo: tipo,
            referenciaTipo: 'CARGO',
            referenciaId: referenciaId,
            motivo: formData.motivo,
            dadosAntes: dadosAntes ? JSON.stringify(dadosAntes) : null,
            dadosDepois: JSON.stringify(dadosDepois)
          })
        });
        Toast.success('Solicitação criada! Aguarde aprovação.');
        Modal.close('modal');
      } catch (e) {
        Toast.error(e.message || 'Erro ao criar solicitação');
      }
    }

    /* ── Acoes genericas sobre cargo ── */
    var actionTargetId = null;
    var actionType = null;
    var actionRefTipo = null;

    function requestAction(cargoId, cargoTitulo, tipo, descricaoAcao) {
      actionTargetId = cargoId;
      actionType = tipo;
      actionRefTipo = null;
      document.getElementById("actionTitle").textContent = 'Solicitar ' + descricaoAcao.charAt(0).toUpperCase() + descricaoAcao.slice(1);
      document.getElementById("actionMsg").innerHTML = 'Deseja solicitar a <strong>' + descricaoAcao + '</strong> do cargo <strong>' + cargoTitulo + '</strong>?';
      document.getElementById("actionMotivo").value = '';

      var btn = document.getElementById("actionConfirmBtn");
      btn.style.background = '';
      btn.style.color = '';
      btn.className = 'btn btn-primary';
      if (tipo === 'EXCLUSAO_CARGO' || tipo === 'DESATIVACAO_CARGO') {
        btn.style.background = 'var(--error-red)';
        btn.style.color = 'white';
        btn.className = 'btn';
      } else if (tipo === 'ABERTURA_VAGA') {
        btn.style.background = 'var(--success-green)';
        btn.style.color = 'white';
        btn.className = 'btn';
      }

      Modal.open('actionModal');
    }

    async function confirmAction() {
      var motivo = document.getElementById("actionMotivo").value.trim();
      if (!motivo) {
        Toast.error('Informe o motivo');
        document.getElementById("actionMotivo").focus();
        return;
      }
      try {
        await api('/api/solicitacoes', {
          method: 'POST',
          body: JSON.stringify({
            tipo: actionType,
            referenciaTipo: actionRefTipo || (actionType === 'ABERTURA_VAGA' ? 'VAGA' : 'CARGO'),
            referenciaId: actionTargetId,
            motivo: motivo
          })
        });
        Toast.success('Solicita\u00e7\u00e3o criada! Aguarde aprova\u00e7\u00e3o.');
        Modal.close('actionModal');
      } catch (e) {
        Toast.error(e.message || 'Erro ao criar solicita\u00e7\u00e3o');
      }
    }

    /* ── Demiss\u00e3o ── */
    function requestDemissao(funcId, funcNome, cargoId) {
      actionTargetId = funcId;
      actionType = 'DESATIVACAO_FUNCIONARIO';
      document.getElementById("actionTitle").textContent = 'Solicitar Demiss\u00e3o';
      document.getElementById("actionMsg").innerHTML = 'Deseja solicitar a <strong>demiss\u00e3o</strong> de <strong>' + funcNome + '</strong>?';
      document.getElementById("actionMotivo").value = '';

      var btn = document.getElementById("actionConfirmBtn");
      btn.style.background = 'var(--error-red)';
      btn.style.color = 'white';
      btn.className = 'btn';

      // Override referenciaTipo for this action
      actionRefTipo = 'FUNCIONARIO';
      Modal.open('actionModal');
    }

    /* ── Abertura de Vaga Modal ── */
    var vagaCargoId = null;
    var vagaDeptId = null;

    function openVagaModal(cargoId, cargoTitulo, deptId) {
      vagaCargoId = cargoId;
      vagaDeptId = deptId;
      document.getElementById("vagaMsg").innerHTML = 'Abrir vaga para o cargo <strong>' + cargoTitulo + '</strong>';
      document.getElementById("vagaTitulo").value = cargoTitulo;
      document.getElementById("vagaDescricao").value = '';
      document.getElementById("vagaQuantidade").value = '1';
      document.getElementById("vagaPrioridade").value = 'MEDIA';
      document.getElementById("vagaTipoContrato").value = 'CLT';
      document.getElementById("vagaModeloTrabalho").value = 'PRESENCIAL';
      document.getElementById("vagaLocalTrabalho").value = '';
      document.getElementById("vagaSalarioMin").value = '';
      document.getElementById("vagaSalarioMax").value = '';
      document.getElementById("vagaRequisitos").value = '';
      document.getElementById("vagaMotivo").value = '';
      Modal.open('vagaModal');
      Mask.initAll();
    }

    function parseCurrency(val) {
      if (!val) return null;
      return parseFloat(String(val).replace(/[^\d,]/g, '').replace(',', '.')) || null;
    }

    async function confirmVaga() {
      var titulo = document.getElementById("vagaTitulo").value.trim();
      var motivo = document.getElementById("vagaMotivo").value.trim();
      if (!titulo) { Toast.error('Informe o t\u00edtulo da vaga'); return; }
      if (!motivo) { Toast.error('Informe o motivo'); return; }

      var dadosDepois = {
        titulo: titulo,
        descricao: document.getElementById("vagaDescricao").value.trim() || null,
        quantidade: parseInt(document.getElementById("vagaQuantidade").value) || 1,
        prioridade: document.getElementById("vagaPrioridade").value,
        tipoContrato: document.getElementById("vagaTipoContrato").value,
        modeloTrabalho: document.getElementById("vagaModeloTrabalho").value,
        localTrabalho: document.getElementById("vagaLocalTrabalho").value.trim() || null,
        salarioMin: parseCurrency(document.getElementById("vagaSalarioMin").value),
        salarioMax: parseCurrency(document.getElementById("vagaSalarioMax").value),
        requisitos: document.getElementById("vagaRequisitos").value.trim() || null,
        cargoId: vagaCargoId,
        departamentoId: vagaDeptId
      };

      try {
        await api('/api/solicitacoes', {
          method: 'POST',
          body: JSON.stringify({
            tipo: 'ABERTURA_VAGA',
            referenciaTipo: 'CARGO',
            referenciaId: vagaCargoId,
            motivo: motivo,
            dadosDepois: JSON.stringify(dadosDepois)
          })
        });
        Toast.success('Solicita\u00e7\u00e3o de abertura de vaga criada! Aguarde aprova\u00e7\u00e3o.');
        Modal.close('vagaModal');
      } catch (e) {
        Toast.error(e.message || 'Erro ao criar solicita\u00e7\u00e3o');
      }
    }

    /* ── Promo\u00e7\u00e3o Modal ── */
    var promoCargoId = null;

    function findCargoInData(cargoId) {
      for (var i = 0; i < allData.length; i++) {
        for (var j = 0; j < allData[i].cargos.length; j++) {
          if (allData[i].cargos[j].id === cargoId) {
            return { cargo: allData[i].cargos[j], departamento: allData[i] };
          }
        }
      }
      return null;
    }

    function openPromoModal(cargoId) {
      promoCargoId = cargoId;
      var info = findCargoInData(cargoId);
      if (!info) { Toast.error('Cargo n\u00e3o encontrado'); return; }

      var funcNomes = info.cargo.funcionarios.map(function(f) { return esc(f.nome); }).join(', ');
      document.getElementById("promoMsg").innerHTML =
        'Promover <strong>' + funcNomes + '</strong> do cargo <strong>' + esc(info.cargo.titulo) + '</strong> (' + esc(info.departamento.nome) + ')';

      // Popular dropdowns
      var deptSelect = document.getElementById("promoDeptSelect");
      deptSelect.innerHTML = '<option value="">Selecione</option>';
      departamentos.forEach(function(d) {
        deptSelect.innerHTML += '<option value="' + d.id + '">' + esc(d.nome) + '</option>';
      });

      document.getElementById("promoCargoSelect").innerHTML = '<option value="">Selecione o departamento primeiro</option>';
      document.getElementById("promoMotivo").value = '';
      Modal.open('promoModal');
    }

    async function filterPromoCargos() {
      var deptId = document.getElementById("promoDeptSelect").value;
      var cargoSelect = document.getElementById("promoCargoSelect");
      if (!deptId) {
        cargoSelect.innerHTML = '<option value="">Selecione o departamento primeiro</option>';
        return;
      }
      try {
        var cargos = await api(API + '?departamentoId=' + deptId);
        cargoSelect.innerHTML = '<option value="">Selecione</option>';
        (cargos || []).forEach(function(c) {
          cargoSelect.innerHTML += '<option value="' + c.id + '">' + esc(c.titulo) + '</option>';
        });
      } catch (e) {
        cargoSelect.innerHTML = '<option value="">Erro ao carregar</option>';
      }
    }

    async function confirmPromotion() {
      var deptId = document.getElementById("promoDeptSelect").value;
      var cargoNovoId = document.getElementById("promoCargoSelect").value;
      var motivo = document.getElementById("promoMotivo").value.trim();

      if (!deptId || !cargoNovoId) {
        Toast.error('Selecione o novo departamento e cargo');
        return;
      }
      if (!motivo) {
        Toast.error('Informe o motivo');
        document.getElementById("promoMotivo").focus();
        return;
      }

      var info = findCargoInData(promoCargoId);
      var funcId = info && info.cargo.funcionarios.length > 0 ? info.cargo.funcionarios[0].id : null;

      var dadosAntes = {
        cargoId: promoCargoId,
        cargoTitulo: info ? info.cargo.titulo : null,
        departamentoId: info ? info.departamento.id : null,
        departamentoNome: info ? info.departamento.nome : null
      };

      var dadosDepois = {
        cargoNovoId: Number(cargoNovoId),
        departamentoNovoId: Number(deptId),
        funcionarioId: funcId
      };

      try {
        await api('/api/solicitacoes', {
          method: 'POST',
          body: JSON.stringify({
            tipo: 'PROMOCAO',
            referenciaTipo: 'FUNCIONARIO',
            referenciaId: funcId,
            motivo: motivo,
            dadosAntes: JSON.stringify(dadosAntes),
            dadosDepois: JSON.stringify(dadosDepois)
          })
        });
        Toast.success('Solicita\u00e7\u00e3o de promo\u00e7\u00e3o criada! Aguarde aprova\u00e7\u00e3o.');
        Modal.close('promoModal');
      } catch (e) {
        Toast.error(e.message || 'Erro ao solicitar promo\u00e7\u00e3o');
      }
    }
  </script>
</body>
