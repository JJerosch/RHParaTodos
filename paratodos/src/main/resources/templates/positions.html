<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Cargos')}"><title>Cargos</title></head>

<body>
  <script th:inline="javascript">
    window.__CURRENT_USER__ = {
      email: /*[[${currentUser.email}]]*/ 'usuario@local',
      role:  /*[[${currentUser.role}]]*/ 'EMPLOYEE'
    };
  </script>

  <aside th:replace="~{fragments/sidebar :: admin('positions')}"></aside>


  <div class="main-content">
    <header th:replace="~{fragments/topbar :: topbar('Cargos')}"></header>

    <div class="content-area">
      <div class="page-header">
        <div>
          <h2 class="page-title">Gestão de Cargos</h2>
          <p class="page-subtitle">Defina cargos e faixas salariais</p>
        </div>
        <div class="page-actions" data-action-roles="ADMIN,RH_CHEFE,RH_ASSISTENTE">
          <button class="btn btn-primary" onclick="openModal()">+ Novo Cargo</button>
        </div>
      </div>

      <div class="filters-bar">
        <div class="search-box">
          <input type="text" id="search" placeholder="Buscar cargo..." onkeyup="filter()">
        </div>
        <div class="filter-group">
          <label>Departamento:</label>
          <select id="filterDept" onchange="filter()">
            <option value="">Todos</option>
            <!-- Sera preenchido dinamicamente -->
          </select>
        </div>
        <div class="filter-group">
          <label>Nível:</label>
          <select id="filterLevel" onchange="filter()">
            <option value="">Todos</option>
            <option value="JUNIOR">Junior</option>
            <option value="PLENO">Pleno</option>
            <option value="SENIOR">Senior</option>
            <option value="GESTAO">Gestão</option>
          </select>
        </div>
      </div>

      <div class="table-container">
        <table class="data-table" id="dataTable">
          <thead>
            <tr>
              <th>Cargo</th>
              <th>Departamento</th>
              <th>Nível</th>
              <th class="hide-mobile">Faixa Salarial</th>
              <th class="hide-mobile">Ocupantes</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-dialog modal-md">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Novo Cargo</h3>
        <button class="modal-close" onclick="Modal.close('modal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="form">
          <input type="hidden" name="id">
          <div class="form-row form-row-2">
            <div class="form-group">
              <label class="form-label">Título do Cargo *</label>
              <input type="text" class="form-input" name="titulo" required>
            </div>
            <div class="form-group">
              <label class="form-label">Departamento *</label>
              <select class="form-select" name="departamentoId" id="formDeptSelect" required>
                <option value="">Selecione</option>
                <!-- Sera preenchido dinamicamente -->
              </select>
            </div>
          </div>
          <div class="form-row form-row-3">
            <div class="form-group">
              <label class="form-label">Nível</label>
              <select class="form-select" name="nivel">
                <option value="">Selecione</option>
                <option value="JUNIOR">Junior</option>
                <option value="PLENO">Pleno</option>
                <option value="SENIOR">Senior</option>
                <option value="GESTAO">Gestão</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Salário Mínimo</label>
              <input type="text" class="form-input" name="salarioMinimo" data-mask="currency">
            </div>
            <div class="form-group">
              <label class="form-label">Salário Máximo</label>
              <input type="text" class="form-input" name="salarioMaximo" data-mask="currency">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Descrição</label>
            <textarea class="form-input" name="descricao" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label class="checkbox-label"><input type="checkbox" name="ativo" checked><span>Cargo Ativo</span></label>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('modal')">Cancelar</button>
        <button class="btn btn-primary" onclick="save()">Salvar</button>
      </div>
    </div>
  </div>

  <div th:replace="~{fragments/scripts :: common}"></div>
  <script>
    const API = '/api/positions';

    // Mock data (fallback)
    const mockData = [
      { id: 1, titulo: "Desenvolvedor Backend", departamentoId: 3, departamentoNome: "Tecnologia", nivel: "SENIOR", salarioMinimo: 10000, salarioMaximo: 15000, ocupantes: 8, ativo: true },
      { id: 2, titulo: "Desenvolvedor Frontend", departamentoId: 3, departamentoNome: "Tecnologia", nivel: "PLENO", salarioMinimo: 7000, salarioMaximo: 11000, ocupantes: 6, ativo: true },
      { id: 3, titulo: "Analista de RH", departamentoId: 1, departamentoNome: "Recursos Humanos", nivel: "PLENO", salarioMinimo: 5000, salarioMaximo: 8000, ocupantes: 4, ativo: true },
      { id: 4, titulo: "Gerente Financeiro", departamentoId: 4, departamentoNome: "Financeiro", nivel: "GESTAO", salarioMinimo: 15000, salarioMaximo: 22000, ocupantes: 2, ativo: true },
      { id: 5, titulo: "Vendedor", departamentoId: null, departamentoNome: "Comercial", nivel: "JUNIOR", salarioMinimo: 3000, salarioMaximo: 5000, ocupantes: 15, ativo: true },
      { id: 6, titulo: "Tech Lead", departamentoId: 3, departamentoNome: "Tecnologia", nivel: "GESTAO", salarioMinimo: 18000, salarioMaximo: 25000, ocupantes: 3, ativo: true }
    ];
    const mockDepartamentos = [
      { id: 1, nome: "Recursos Humanos" },
      { id: 2, nome: "Departamento Pessoal" },
      { id: 3, nome: "Tecnologia" },
      { id: 4, nome: "Financeiro" }
    ];

    let data = [];
    let filtered = [];
    let departamentos = [];
    let currentId = null;
    let usingMock = false;

    const nivelLabels = { JUNIOR: 'Junior', PLENO: 'Pleno', SENIOR: 'Senior', GESTAO: 'Gestão' };

    document.addEventListener("DOMContentLoaded", () => {
      if (!Auth.requireAuth()) return;
      initUserMenu();
      initSidebar();
      Auth.applyRoleVisibility(document);
      Auth.applyActionVisibility(document);
      loadData();
      Mask.initAll();
    });

    async function loadData() {
      try {
        const [posRes, deptRes] = await Promise.all([
          fetch(API, { credentials: 'same-origin' }),
          fetch(API + '/departamentos', { credentials: 'same-origin' })
        ]);
        if (!posRes.ok) throw new Error('API indisponível');
        data = await posRes.json();
        departamentos = await deptRes.json();
        usingMock = false;
      } catch (e) {
        console.log('Usando dados mock:', e.message);
        data = mockData;
        departamentos = mockDepartamentos;
        usingMock = true;
      }
      filtered = [...data];
      populateDeptDropdowns();
      render();
    }

    function populateDeptDropdowns() {
      const filterSelect = document.getElementById("filterDept");
      const formSelect = document.getElementById("formDeptSelect");
      filterSelect.innerHTML = '<option value="">Todos</option>';
      formSelect.innerHTML = '<option value="">Selecione</option>';
      departamentos.forEach(d => {
        filterSelect.innerHTML += '<option value="' + d.id + '">' + d.nome + '</option>';
        formSelect.innerHTML += '<option value="' + d.id + '">' + d.nome + '</option>';
      });
    }

    function filter() {
      const search = document.getElementById("search").value.toLowerCase();
      const dept = document.getElementById("filterDept").value;
      const level = document.getElementById("filterLevel").value;

      if (!usingMock && (search || dept || level)) {
        // Usar filtro da API com query params
        const params = new URLSearchParams();
        if (search) params.set('search', search);
        if (dept) params.set('departamentoId', dept);
        if (level) params.set('nivel', level);
        fetch(API + '?' + params.toString(), { credentials: 'same-origin' })
          .then(r => r.json())
          .then(result => { filtered = result; render(); })
          .catch(() => { filterLocal(search, dept, level); });
      } else {
        filterLocal(search, dept, level);
      }
    }

    function filterLocal(search, dept, level) {
      filtered = data.filter(item =>
        (!search || item.titulo.toLowerCase().includes(search)) &&
        (!dept || String(item.departamentoId) === dept) &&
        (!level || item.nivel === level)
      );
      render();
    }

    const canWrite = Auth.hasAnyRole(['ADMIN', 'RH_CHEFE', 'RH_ASSISTENTE']);

    function render() {
      document.getElementById("tableBody").innerHTML = filtered.map(item => `
        <tr>
          <td><strong>${item.titulo}</strong></td>
          <td>${item.departamentoNome || '-'}</td>
          <td><span class="badge badge-info">${nivelLabels[item.nivel] || item.nivel || '-'}</span></td>
          <td class="hide-mobile">${formatCurrency(item.salarioMinimo)} - ${formatCurrency(item.salarioMaximo)}</td>
          <td class="hide-mobile">${item.ocupantes}</td>
          <td><span class="badge ${item.ativo ? 'badge-success' : 'badge-danger'}">${item.ativo ? 'Ativo' : 'Inativo'}</span></td>
          <td>
            ${canWrite ? '<div class="cell-actions"><button class="btn-icon edit" onclick="edit(' + item.id + ')"><img src="/assets/pencil (1).png" alt="editar"></button><button class="btn-icon delete" onclick="remove(' + item.id + ')"><img src="/assets/trash-2 (1).png" alt="excluir"></button></div>' : '-'}
          </td>
        </tr>
      `).join('');
    }

    function openModal(id = null) {
      currentId = id;
      document.getElementById("form").reset();
      document.getElementById("modalTitle").textContent = id ? "Editar Cargo" : "Novo Cargo";
      if (id) {
        const item = data.find(d => d.id === id);
        if (item) Form.populate('form', item);
      }
      Modal.open('modal');
      Mask.initAll();
    }

    function edit(id) { openModal(id); }

    async function save() {
      const formData = Form.serialize('form');
      if (!formData.titulo || !formData.departamentoId) {
        Toast.error('Preencha os campos obrigatórios');
        return;
      }

      const body = {
        titulo: formData.titulo,
        descricao: formData.descricao || null,
        nivel: formData.nivel || null,
        departamentoId: Number(formData.departamentoId),
        salarioMinimo: formData.salarioMinimo ? parseFloat(String(formData.salarioMinimo).replace(/[^\d,]/g, '').replace(',', '.')) : null,
        salarioMaximo: formData.salarioMaximo ? parseFloat(String(formData.salarioMaximo).replace(/[^\d,]/g, '').replace(',', '.')) : null,
        ativo: formData.ativo !== undefined ? !!formData.ativo : true
      };

      try {
        let res;
        if (currentId) {
          res = await fetch(API + '/' + currentId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify(body) });
        } else {
          res = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify(body) });
        }
        if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error || 'Erro ao salvar'); }
        Toast.success(currentId ? 'Cargo atualizado!' : 'Cargo criado!');
        Modal.close('modal');
        loadData();
      } catch (e) {
        console.error(e);
        Toast.error(e.message || 'Erro ao salvar cargo');
      }
    }

    function remove(id) {
      const item = data.find(d => d.id === id);
      Confirm.show('Excluir o cargo <strong>' + item.titulo + '</strong>?', async () => {
        try {
          const res = await fetch(API + '/' + id, { method: 'DELETE', credentials: 'same-origin' });
          if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error || 'Erro ao excluir'); }
          Toast.success('Cargo excluído!');
          loadData();
        } catch (e) {
          console.error(e);
          Toast.error(e.message || 'Erro ao excluir cargo');
        }
      });
    }

    function formatCurrency(val) {
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0);
    }
  </script>
</body>

</html>
