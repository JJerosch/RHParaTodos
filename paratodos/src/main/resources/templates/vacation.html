<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Férias')}">
  <title>Férias</title>
</head>
<body>

<script th:inline="javascript">
  window.__CURRENT_USER__ = {
    email: /*[[${currentUser.email}]]*/ 'usuario@local',
    role:  /*[[${currentUser.role}]]*/ 'ADMIN'
  };
</script>

<aside th:replace="~{fragments/sidebar :: admin('vacation')}"></aside>

<div class="main-content">
  <header th:replace="~{fragments/topbar :: topbar('Férias')}"></header>

  <div class="content-area">
    <div class="page-header-custom">
      <div>
        <h1 class="page-title">Férias</h1>
        <p class="page-subtitle">Solicite férias ativas para funcionários disponíveis.</p>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">Funcionários ativos</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statEmFerias">0</div>
        <div class="stat-label">Em férias agora</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statDisponiveis">0</div>
        <div class="stat-label">Disponíveis</div>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <div class="toolbar-left">
          <input
                  type="text"
                  id="searchInput"
                  class="form-input"
                  placeholder="Buscar por nome ou matrícula"
          />
        </div>
        <div class="toolbar-right">
          <select id="statusFilter" class="form-input">
            <option value="">Todos</option>
            <option value="DISPONIVEL">Disponíveis</option>
            <option value="EM_FERIAS">Em férias</option>
          </select>
        </div>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
          <tr>
            <th>Matrícula</th>
            <th>Funcionário</th>
            <th>Cargo</th>
            <th>Departamento</th>
            <th>Status</th>
            <th>Período atual</th>
            <th>Ação</th>
          </tr>
          </thead>
          <tbody id="vacationBody">
          <tr>
            <td colspan="7" class="empty-cell">Carregando...</td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="vacationModal" style="display:none;">
  <div class="modal-card">
    <div class="modal-header">
      <h3>Solicitar férias</h3>
      <button type="button" class="btn-icon" onclick="fecharModal()">✕</button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Funcionário</label>
        <input type="text" id="modalFuncionarioNome" class="form-input" disabled />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Data início</label>
          <input type="date" id="modalDataInicio" class="form-input" />
        </div>

        <div class="form-group">
          <label class="form-label">Data fim</label>
          <input type="date" id="modalDataFim" class="form-input" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Observação</label>
        <textarea id="modalObservacao" class="form-input" rows="4" placeholder="Opcional"></textarea>
      </div>

      <div class="modal-note">
        Nesta versão simples, as férias precisam incluir a data de hoje.
      </div>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
      <button type="button" class="btn btn-primary" onclick="salvarFerias()">Salvar</button>
    </div>
  </div>
</div>

<style>
  .page-header-custom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .page-title {
    margin: 0 0 6px 0;
    font-size: 28px;
    font-weight: 700;
    color: var(--primary-dark);
  }

  .page-subtitle {
    margin: 0;
    color: var(--gray-500);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: #fff;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg);
    padding: 20px;
    text-align: center;
    box-shadow: var(--shadow-sm);
  }

  .stat-value {
    font-size: 32px;
    font-weight: 700;
    color: var(--primary-dark);
  }

  .stat-label {
    margin-top: 6px;
    color: var(--gray-500);
    font-size: 14px;
  }

  .toolbar {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .toolbar-left,
  .toolbar-right {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .toolbar-left {
    flex: 1;
    min-width: 260px;
  }

  .table-wrap {
    overflow-x: auto;
  }

  .empty-cell {
    text-align: center;
    color: var(--gray-400);
    padding: 24px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
  }

  .badge-success {
    background: rgba(46, 204, 113, 0.12);
    color: #1d7f47;
  }

  .badge-secondary {
    background: rgba(52, 73, 94, 0.12);
    color: #415a77;
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 20px;
  }

  .modal-card {
    background: #fff;
    border-radius: 16px;
    width: 100%;
    max-width: 560px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.18);
    overflow: hidden;
  }

  .modal-header,
  .modal-footer {
    padding: 18px 20px;
    border-bottom: 1px solid var(--gray-100);
  }

  .modal-footer {
    border-bottom: none;
    border-top: 1px solid var(--gray-100);
    display: flex;
    justify-content: flex-end;
    gap: 12px;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-header h3 {
    margin: 0;
  }

  .modal-body {
    padding: 20px;
  }

  .form-row {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .modal-note {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    background: var(--gray-50);
    color: var(--gray-600);
    font-size: 13px;
  }

  .btn-action {
    min-width: 150px;
  }

  @media (max-width: 768px) {
    .stats-grid {
      grid-template-columns: 1fr;
    }

    .form-row {
      grid-template-columns: 1fr;
    }
  }
</style>

<div th:replace="~{fragments/scripts :: common}"></div>

<script>
  let rowsFerias = [];
  let funcionarioSelecionadoId = null;

  document.addEventListener("DOMContentLoaded", async function () {
    if (!Auth.requireAuth()) return;

    initUserMenu();
    initSidebar();
    Auth.applyRoleVisibility(document);
    Auth.applyActionVisibility(document);

    document.getElementById("searchInput").addEventListener("input", renderTabela);
    document.getElementById("statusFilter").addEventListener("change", renderTabela);

    await carregarPagina();
  });

  async function carregarPagina() {
    try {
      const resp = await fetch("/api/admin/ferias/funcionarios", {
        credentials: "same-origin"
      });

      const data = await resp.json();

      if (!resp.ok) {
        Toast.error(data.error || "Erro ao carregar férias.");
        return;
      }

      document.getElementById("statTotal").textContent = data.summary.totalFuncionarios ?? 0;
      document.getElementById("statEmFerias").textContent = data.summary.emFerias ?? 0;
      document.getElementById("statDisponiveis").textContent = data.summary.disponiveis ?? 0;

      rowsFerias = data.rows || [];
      renderTabela();
    } catch (e) {
      console.error(e);
      Toast.error("Erro ao carregar férias.");
    }
  }

  function renderTabela() {
    const tbody = document.getElementById("vacationBody");
    const busca = (document.getElementById("searchInput").value || "").trim().toLowerCase();
    const status = document.getElementById("statusFilter").value || "";

    let filtrados = rowsFerias.filter(row => {
      const matchBusca =
              !busca ||
              (row.nomeCompleto || "").toLowerCase().includes(busca) ||
              (row.matricula || "").toLowerCase().includes(busca);

      const matchStatus = !status || row.statusFerias === status;
      return matchBusca && matchStatus;
    });

    if (!filtrados.length) {
      tbody.innerHTML = `
                <tr>
                    <td colspan="7" class="empty-cell">Nenhum funcionário encontrado.</td>
                </tr>
            `;
      return;
    }

    tbody.innerHTML = filtrados.map(row => `
            <tr>
                <td>${row.matricula || "-"}</td>
                <td>${row.nomeCompleto || "-"}</td>
                <td>${row.cargo || "-"}</td>
                <td>${row.departamento || "-"}</td>
                <td>${renderStatus(row)}</td>
                <td>${renderPeriodo(row)}</td>
                <td>${renderAcao(row)}</td>
            </tr>
        `).join("");
  }

  function renderStatus(row) {
    if (row.statusFerias === "EM_FERIAS") {
      return `<span class="badge badge-secondary">Em férias</span>`;
    }
    return `<span class="badge badge-success">Disponível</span>`;
  }

  function renderPeriodo(row) {
    if (row.statusFerias !== "EM_FERIAS") {
      return "-";
    }
    return `${formatDate(row.dataInicioFerias)} até ${formatDate(row.dataFimFerias)}`;
  }

  function renderAcao(row) {
    if (row.statusFerias === "EM_FERIAS") {
      return `<button class="btn btn-secondary btn-action" disabled>Em férias</button>`;
    }

    const nomeEscapado = (row.nomeCompleto || "").replace(/'/g, "\\'");
    return `
            <button
                class="btn btn-primary btn-action"
                type="button"
                onclick="abrirModal(${row.funcionarioId}, '${nomeEscapado}')"
            >
                Solicitar férias
            </button>
        `;
  }

  function abrirModal(funcionarioId, nome) {
    funcionarioSelecionadoId = funcionarioId;

    const hoje = new Date().toISOString().slice(0, 10);

    document.getElementById("modalFuncionarioNome").value = nome || "";
    document.getElementById("modalDataInicio").value = hoje;
    document.getElementById("modalDataFim").value = hoje;
    document.getElementById("modalObservacao").value = "";
    document.getElementById("vacationModal").style.display = "flex";
  }

  function fecharModal() {
    funcionarioSelecionadoId = null;
    document.getElementById("vacationModal").style.display = "none";
  }

  async function salvarFerias() {
    if (!funcionarioSelecionadoId) {
      Toast.error("Funcionário não selecionado.");
      return;
    }

    const dataInicio = document.getElementById("modalDataInicio").value;
    const dataFim = document.getElementById("modalDataFim").value;
    const observacao = document.getElementById("modalObservacao").value;

    if (!dataInicio || !dataFim) {
      Toast.error("Informe a data inicial e final.");
      return;
    }

    try {
      const resp = await fetch("/api/admin/ferias", {
        method: "POST",
        credentials: "same-origin",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          funcionarioId: funcionarioSelecionadoId,
          dataInicio,
          dataFim,
          observacao
        })
      });

      const data = await resp.json().catch(() => ({}));

      if (!resp.ok) {
        Toast.error(data.error || "Erro ao salvar férias.");
        return;
      }

      Toast.success(data.message || "Férias registradas com sucesso.");
      fecharModal();
      await carregarPagina();
    } catch (e) {
      console.error(e);
      Toast.error("Erro ao salvar férias.");
    }
  }

  function formatDate(value) {
    if (!value) return "-";
    const parts = value.split("-");
    if (parts.length !== 3) return value;
    return `${parts[2]}/${parts[1]}/${parts[0]}`;
  }
</script>

</body>
</html>
