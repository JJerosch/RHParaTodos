<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Benefícios')}"><title>Benefícios</title></head>

<body>
  <script th:inline="javascript">
    window.__CURRENT_USER__ = {
      email: /*[[${currentUser.email}]]*/ 'usuario@local',
      role:  /*[[${currentUser.role}]]*/ 'EMPLOYEE'
    };
  </script>

  <aside th:replace="~{fragments/sidebar :: admin('benefits')}"></aside>

  <div class="main-content">
    <header th:replace="~{fragments/topbar :: topbar('Benefícios')}"></header>

    <div class="content-area">
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-box-icon" style="background: rgba(44, 62, 80, 0.1);"><img
              th:src="@{/assets/gift (2).png}" alt="icone_tipos_beneficios"></div>
          <div class="stat-box-value" id="statTipos">0</div>
          <div class="stat-box-label">Tipos de Benefícios</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-icon" style="background: rgba(39, 174, 96, 0.1);"><img
              th:src="@{/assets/users (1).png}" alt="icone_beneficiarios"></div>
          <div class="stat-box-value" id="statBeneficiarios">0</div>
          <div class="stat-box-label">Beneficiários</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-icon" style="background: rgba(243, 156, 18, 0.1);"><img
              th:src="@{/assets/banknote (1).png}" alt="icone_custo_mensal"></div>
          <div class="stat-box-value" id="statCusto">R$ 0</div>
          <div class="stat-box-label">Custo Mensal</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-icon" style="background: rgba(231, 76, 60, 0.1);"><img
              th:src="@{/assets/chart-column (1).png}" alt="icone_custo_funcionario"></div>
          <div class="stat-box-value" id="statCustoFunc">R$ 0</div>
          <div class="stat-box-label">Custo/Funcionário</div>
        </div>
      </div>

      <div class="page-header">
        <div>
          <h2 class="page-title">Gestão de Benefícios</h2>
          <p class="page-subtitle">Configure e gerencie os benefícios oferecidos</p>
        </div>
        <div class="page-actions"><button class="btn btn-primary" onclick="openModal()">+ Novo Benefício</button></div>
      </div>

      <div class="departments-grid" id="benefitsGrid"></div>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-dialog modal-md">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Novo Benefício</h3><button class="modal-close"
          onclick="Modal.close('modal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="form">
          <input type="hidden" name="id">
          <div class="form-row form-row-2">
            <div class="form-group"><label class="form-label">Nome do Benefício *</label><input type="text"
                class="form-input" name="nome" required></div>
            <div class="form-group"><label class="form-label">Natureza *</label>
              <select class="form-select" name="natureza" required id="naturezaSelect" onchange="onNaturezaChange()">
                <option value="">Selecione</option>
                <option value="PROVENTO">Provento</option>
                <option value="DESCONTO">Desconto</option>
                <option value="INFORMATIVO">Informativo</option>
              </select>
            </div>
          </div>
          <div class="form-group"><label class="form-label">Descrição</label><textarea class="form-input"
              name="descricao" rows="2"></textarea></div>
          <div class="form-row form-row-2">
            <div class="form-group"><label class="form-label">Valor Padrão</label><input type="text" class="form-input"
                name="valorPadrao" data-mask="currency"></div>
            <div class="form-group"><label class="form-label">Desconto em Folha?</label><select class="form-select"
                name="possuiDescontoFolha">
                <option value="true">Sim</option>
                <option value="false">Não</option>
              </select></div>
          </div>
          <div class="form-row form-row-2" id="incidenciasRow">
            <div class="form-group"><label class="checkbox-label"><input type="checkbox" name="incideFerias"><span>Incide em Férias</span></label></div>
            <div class="form-group"><label class="checkbox-label"><input type="checkbox" name="incideDecimo"><span>Incide em 13º Salário</span></label></div>
          </div>
          <div class="form-group">
            <label class="form-label">Cargos Vinculados</label>
            <select class="form-select" id="cargosSelect" multiple style="height: 100px;">
            </select>
            <small style="color: var(--gray-400);">Segure Ctrl para selecionar múltiplos</small>
          </div>
          <div class="form-group"><label class="checkbox-label"><input type="checkbox" name="ativo"
                checked><span>Benefício Ativo</span></label></div>
        </form>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary"
          onclick="Modal.close('modal')">Cancelar</button><button class="btn btn-primary"
          onclick="save()">Salvar</button></div>
    </div>
  </div>

  <style>
    .departments-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--spacing-4)
    }

    .benefit-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: var(--spacing-5);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-200)
    }

    .benefit-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: var(--spacing-3)
    }

    .benefit-icon {
      width: 48px;
      height: 48px;
      background: var(--gray-100);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px
    }

    .benefit-name {
      font-size: var(--font-size-lg);
      font-weight: 600;
      margin-bottom: var(--spacing-1)
    }

    .benefit-desc {
      font-size: var(--font-size-sm);
      color: var(--gray-500);
      margin-bottom: var(--spacing-3)
    }

    .benefit-stats {
      display: flex;
      justify-content: space-between;
      padding-top: var(--spacing-3);
      border-top: 1px solid var(--gray-100);
      font-size: var(--font-size-sm)
    }
  </style>

  <div th:replace="~{fragments/scripts :: common}"></div>
  <script>
    const API = '/api/benefits';

    // Mock data (fallback)
    const mockBenefits = [
      { id: 1, nome: "Vale Refeição", descricao: "Cartão para refeições diárias", valorPadrao: 800, natureza: "PROVENTO", possuiDescontoFolha: false, incideFerias: true, incideDecimo: true, beneficiarios: 235, ativo: true },
      { id: 2, nome: "Vale Transporte", descricao: "Auxílio para deslocamento", valorPadrao: 300, natureza: "DESCONTO", possuiDescontoFolha: true, incideFerias: false, incideDecimo: false, beneficiarios: 180, ativo: true },
      { id: 3, nome: "Plano de Saúde", descricao: "Assistência médica completa", valorPadrao: 650, natureza: "DESCONTO", possuiDescontoFolha: true, incideFerias: false, incideDecimo: false, beneficiarios: 248, ativo: true },
      { id: 4, nome: "Plano Odontológico", descricao: "Cobertura odontológica", valorPadrao: 80, natureza: "DESCONTO", possuiDescontoFolha: true, incideFerias: false, incideDecimo: false, beneficiarios: 220, ativo: true },
      { id: 5, nome: "Seguro de Vida", descricao: "Proteção para família", valorPadrao: 50, natureza: "INFORMATIVO", possuiDescontoFolha: false, incideFerias: false, incideDecimo: false, beneficiarios: 248, ativo: true },
      { id: 6, nome: "Gympass", descricao: "Acesso a academias parceiras", valorPadrao: 100, natureza: "DESCONTO", possuiDescontoFolha: true, incideFerias: false, incideDecimo: false, beneficiarios: 85, ativo: true }
    ];

    let benefits = [];
    let allCargos = [];
    let currentId = null;

    const naturezaLabels = { PROVENTO: 'Provento', DESCONTO: 'Desconto', INFORMATIVO: 'Informativo' };
    const naturezaBadge  = { PROVENTO: 'badge-success', DESCONTO: 'badge-warning', INFORMATIVO: 'badge-info' };

    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.requireAuth()) return;
      initUserMenu();
      initSidebar();
      Auth.applyRoleVisibility(document);
      Auth.applyActionVisibility(document);
      loadData();
      Mask.initAll();
    });

    async function loadData() {
      try {
        const [listRes, statsRes, cargosRes] = await Promise.all([
          fetch(API, { credentials: 'same-origin' }),
          fetch(API + '/stats', { credentials: 'same-origin' }),
          fetch('/api/employees/cargos', { credentials: 'same-origin' })
        ]);
        if (!listRes.ok) throw new Error('API indisponível');
        benefits = await listRes.json();
        allCargos = await cargosRes.json().catch(() => []);
        const stats = await statsRes.json();
        document.getElementById("statTipos").textContent = stats.tipos;
        document.getElementById("statBeneficiarios").textContent = stats.beneficiarios;
        document.getElementById("statCusto").textContent = formatCurrency(stats.custoMensal);
        document.getElementById("statCustoFunc").textContent = formatCurrency(stats.custoPorFuncionario);

        // Preencher dropdown de cargos
        const cargosSelect = document.getElementById("cargosSelect");
        cargosSelect.innerHTML = allCargos.map(c => '<option value="' + c.id + '">' + c.titulo + '</option>').join('');
      } catch (e) {
        console.log('Usando dados mock:', e.message);
        benefits = mockBenefits;
        updateStatsLocal();
      }
      render();
    }

    function updateStatsLocal() {
      document.getElementById("statTipos").textContent = benefits.length;
      const totalBenef = benefits.reduce((s, b) => s + (b.beneficiarios || 0), 0);
      const custoMensal = benefits.reduce((s, b) => s + (b.valorPadrao || 0) * (b.beneficiarios || 0), 0);
      document.getElementById("statBeneficiarios").textContent = totalBenef;
      document.getElementById("statCusto").textContent = formatCurrency(custoMensal);
      document.getElementById("statCustoFunc").textContent = totalBenef > 0 ? formatCurrency(custoMensal / totalBenef) : 'R$ 0';
    }

    function onNaturezaChange() {
      const val = document.getElementById('naturezaSelect').value;
      const row = document.getElementById('incidenciasRow');
      if (val === 'PROVENTO') {
        row.style.display = '';
      } else {
        row.style.display = 'none';
        document.querySelector('[name="incideFerias"]').checked = false;
        document.querySelector('[name="incideDecimo"]').checked = false;
      }
    }

    function render() {
      document.getElementById("benefitsGrid").innerHTML = benefits.map(b => {
        const cargosHtml = (b.cargos && b.cargos.length > 0)
          ? '<div style="margin-top:var(--spacing-2);display:flex;gap:var(--spacing-1);flex-wrap:wrap;">' +
            b.cargos.map(c => '<span class="badge badge-info" style="font-size:var(--font-size-xs);">' + c.titulo + '</span>').join('') +
            '</div>'
          : '<div style="margin-top:var(--spacing-2);font-size:var(--font-size-xs);color:var(--gray-400);">Nenhum cargo vinculado</div>';
        return `
        <div class="benefit-card">
          <div class="benefit-header">
            <span class="badge ${naturezaBadge[b.natureza] || 'badge-info'}">${naturezaLabels[b.natureza] || b.natureza}</span>
            <div class="cell-actions">
              <button class="btn-icon edit" onclick="edit(${b.id})"><img src="/assets/pencil (1).png" alt="editar"></button>
              <button class="btn-icon delete" onclick="remove(${b.id})"><img src="/assets/trash-2 (1).png" alt="excluir"></button>
            </div>
          </div>
          <h3 class="benefit-name">${b.nome}</h3>
          <p class="benefit-desc">${b.descricao || 'Sem descrição'}</p>
          ${cargosHtml}
          <div class="benefit-stats">
            <span><strong>${b.beneficiarios || 0}</strong> beneficiários</span>
            <span><strong>${formatCurrency(b.valorPadrao)}</strong>/mês</span>
          </div>
        </div>
      `}).join('');
    }

    function openModal(id = null) {
      currentId = id;
      document.getElementById("form").reset();
      document.getElementById("modalTitle").textContent = id ? "Editar Benefício" : "Novo Benefício";

      // Reset cargo selection
      const cargosSelect = document.getElementById("cargosSelect");
      Array.from(cargosSelect.options).forEach(o => o.selected = false);

      if (id) {
        const item = benefits.find(b => b.id === id);
        if (item) {
          Form.populate('form', item);
          // Marcar cargos vinculados
          if (item.cargos) {
            const ids = item.cargos.map(c => String(c.id));
            Array.from(cargosSelect.options).forEach(o => {
              o.selected = ids.includes(o.value);
            });
          }
        }
      }
      onNaturezaChange();
      Modal.open('modal');
      Mask.initAll();
    }

    function edit(id) { openModal(id); }

    async function save() {
      const formData = Form.serialize('form');
      if (!formData.nome) { Toast.error('Nome é obrigatório'); return; }
      if (!formData.natureza) { Toast.error('Natureza é obrigatória'); return; }

      // Coletar cargos selecionados
      const cargosSelect = document.getElementById("cargosSelect");
      const cargoIds = Array.from(cargosSelect.selectedOptions).map(o => Number(o.value));

      const body = {
        nome: formData.nome,
        descricao: formData.descricao || null,
        natureza: formData.natureza,
        valorPadrao: formData.valorPadrao ? parseFloat(String(formData.valorPadrao).replace(/[^\d,]/g, '').replace(',', '.')) : null,
        possuiDescontoFolha: formData.possuiDescontoFolha === 'true' || formData.possuiDescontoFolha === true,
        incideFerias: !!formData.incideFerias,
        incideDecimo: !!formData.incideDecimo,
        ativo: formData.ativo !== undefined ? !!formData.ativo : true,
        cargoIds: cargoIds
      };

      try {
        let res;
        if (currentId) {
          res = await fetch(API + '/' + currentId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify(body) });
        } else {
          res = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify(body) });
        }
        if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error || 'Erro ao salvar'); }
        Toast.success(currentId ? 'Benefício atualizado!' : 'Benefício criado!');
        Modal.close('modal');
        loadData();
      } catch (e) {
        console.error(e);
        Toast.error(e.message || 'Erro ao salvar benefício');
      }
    }

    function remove(id) {
      const item = benefits.find(b => b.id === id);
      Confirm.show('Excluir o benefício <strong>' + item.nome + '</strong>?', async () => {
        try {
          const res = await fetch(API + '/' + id, { method: 'DELETE', credentials: 'same-origin' });
          if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error || 'Erro ao excluir'); }
          Toast.success('Benefício excluído!');
          loadData();
        } catch (e) {
          console.error(e);
          Toast.error(e.message || 'Erro ao excluir benefício');
        }
      });
    }

    function formatCurrency(val) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0); }
  </script>
</body>

</html>
