<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Benefícios')}"><title>Benefícios</title></head>

<body>
  <script th:inline="javascript">
    window.__CURRENT_USER__ = {
      email: /*[[${currentUser.email}]]*/ 'usuario@local',
      role:  /*[[${currentUser.role}]]*/ 'EMPLOYEE'
    };
  </script>

  <aside th:replace="~{fragments/sidebar :: admin('benefits')}"></aside>

  <div class="main-content">
    <header th:replace="~{fragments/topbar :: topbar('Benefícios')}"></header>

    <div class="content-area">
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-box-icon" style="background: rgba(44, 62, 80, 0.1);"><img
              th:src="@{/assets/gift (2).png}" alt="icone_tipos_beneficios"></div>
          <div class="stat-box-value">6</div>
          <div class="stat-box-label">Tipos de Benefícios</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-icon" style="background: rgba(39, 174, 96, 0.1);"><img
              th:src="@{/assets/users (1).png}" alt="icone_beneficiarios"></div>
          <div class="stat-box-value">248</div>
          <div class="stat-box-label">Beneficiários</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-icon" style="background: rgba(243, 156, 18, 0.1);"><img
              th:src="@{/assets/banknote (1).png}" alt="icone_custo_mensal"></div>
          <div class="stat-box-value">R$ 185K</div>
          <div class="stat-box-label">Custo Mensal</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-icon" style="background: rgba(231, 76, 60, 0.1);"><img
              th:src="@{/assets/chart-column (1).png}" alt="icone_custo_funcionario"></div>
          <div class="stat-box-value">R$ 745</div>
          <div class="stat-box-label">Custo/Funcionário</div>
        </div>
      </div>

      <div class="page-header">
        <div>
          <h2 class="page-title">Gestão de Benefícios</h2>
          <p class="page-subtitle">Configure e gerencie os benefícios oferecidos</p>
        </div>
        <div class="page-actions"><button class="btn btn-primary" onclick="openModal()">+ Novo Benefício</button></div>
      </div>

      <div class="departments-grid" id="benefitsGrid"></div>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-dialog modal-md">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Novo Benefício</h3><button class="modal-close"
          onclick="Modal.close('modal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="form">
          <input type="hidden" name="id">
          <div class="form-row form-row-2">
            <div class="form-group"><label class="form-label">Nome do Benefício *</label><input type="text"
                class="form-input" name="nome" required></div>
            <div class="form-group"><label class="form-label">Natureza *</label>
              <select class="form-select" name="natureza" required id="naturezaSelect" onchange="onNaturezaChange()">
                <option value="">Selecione</option>
                <option value="PROVENTO">Provento</option>
                <option value="DESCONTO">Desconto</option>
                <option value="INFORMATIVO">Informativo</option>
              </select>
            </div>
          </div>
          <div class="form-group"><label class="form-label">Descrição</label><textarea class="form-input"
              name="descricao" rows="2"></textarea></div>
          <div class="form-row form-row-2">
            <div class="form-group"><label class="form-label">Valor Padrão</label><input type="text" class="form-input"
                name="valorPadrao" data-mask="currency"></div>
            <div class="form-group"><label class="form-label">Desconto em Folha?</label><select class="form-select"
                name="possuiDescontoFolha">
                <option value="true">Sim</option>
                <option value="false">Não</option>
              </select></div>
          </div>
          <div class="form-row form-row-2" id="incidenciasRow">
            <div class="form-group"><label class="checkbox-label"><input type="checkbox" name="incideFerias"><span>Incide em Férias</span></label></div>
            <div class="form-group"><label class="checkbox-label"><input type="checkbox" name="incideDecimo"><span>Incide em 13º Salário</span></label></div>
          </div>
          <div class="form-group"><label class="checkbox-label"><input type="checkbox" name="ativo"
                checked><span>Benefício Ativo</span></label></div>
        </form>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary"
          onclick="Modal.close('modal')">Cancelar</button><button class="btn btn-primary"
          onclick="save()">Salvar</button></div>
    </div>
  </div>

  <style>
    .departments-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--spacing-4)
    }

    .benefit-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: var(--spacing-5);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-200)
    }

    .benefit-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: var(--spacing-3)
    }

    .benefit-icon {
      width: 48px;
      height: 48px;
      background: var(--gray-100);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px
    }

    .benefit-name {
      font-size: var(--font-size-lg);
      font-weight: 600;
      margin-bottom: var(--spacing-1)
    }

    .benefit-desc {
      font-size: var(--font-size-sm);
      color: var(--gray-500);
      margin-bottom: var(--spacing-3)
    }

    .benefit-stats {
      display: flex;
      justify-content: space-between;
      padding-top: var(--spacing-3);
      border-top: 1px solid var(--gray-100);
      font-size: var(--font-size-sm)
    }
  </style>

  <div th:replace="~{fragments/scripts :: common}"></div>
  <script>
    const benefits = [
      { id: 1, nome: "Vale Refeição", descricao: "Cartão para refeições diárias", valorPadrao: 800, natureza: "PROVENTO", possuiDescontoFolha: false, incideFerias: true, incideDecimo: true, beneficiarios: 235, ativo: true },
      { id: 2, nome: "Vale Transporte", descricao: "Auxílio para deslocamento", valorPadrao: 300, natureza: "DESCONTO", possuiDescontoFolha: true, incideFerias: false, incideDecimo: false, beneficiarios: 180, ativo: true },
      { id: 3, nome: "Plano de Saúde", descricao: "Assistência médica completa", valorPadrao: 650, natureza: "DESCONTO", possuiDescontoFolha: true, incideFerias: false, incideDecimo: false, beneficiarios: 248, ativo: true },
      { id: 4, nome: "Plano Odontológico", descricao: "Cobertura odontológica", valorPadrao: 80, natureza: "DESCONTO", possuiDescontoFolha: true, incideFerias: false, incideDecimo: false, beneficiarios: 220, ativo: true },
      { id: 5, nome: "Seguro de Vida", descricao: "Proteção para família", valorPadrao: 50, natureza: "INFORMATIVO", possuiDescontoFolha: false, incideFerias: false, incideDecimo: false, beneficiarios: 248, ativo: true },
      { id: 6, nome: "Gympass", descricao: "Acesso a academias parceiras", valorPadrao: 100, natureza: "DESCONTO", possuiDescontoFolha: true, incideFerias: false, incideDecimo: false, beneficiarios: 85, ativo: true }
    ];
    let currentId = null;

    const naturezaLabels = { PROVENTO: 'Provento', DESCONTO: 'Desconto', INFORMATIVO: 'Informativo' };
    const naturezaBadge  = { PROVENTO: 'badge-success', DESCONTO: 'badge-warning', INFORMATIVO: 'badge-info' };

    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.requireAuth()) return;
      initUserMenu();
      initSidebar();
      Auth.applyRoleVisibility(document);
      Auth.applyActionVisibility(document);
      render();
      Mask.initAll();
    });

    function onNaturezaChange() {
      const val = document.getElementById('naturezaSelect').value;
      const row = document.getElementById('incidenciasRow');
      if (val === 'PROVENTO') {
        row.style.display = '';
      } else {
        row.style.display = 'none';
        document.querySelector('[name="incideFerias"]').checked = false;
        document.querySelector('[name="incideDecimo"]').checked = false;
      }
    }

    function render() {
      document.getElementById("benefitsGrid").innerHTML = benefits.map(b => `
        <div class="benefit-card">
          <div class="benefit-header">
            <span class="badge ${naturezaBadge[b.natureza] || 'badge-info'}">${naturezaLabels[b.natureza] || b.natureza}</span>
            <div class="cell-actions">
              <button class="btn-icon edit" onclick="edit(${b.id})"><img src="/assets/pencil (1).png" alt="editar"></button>
              <button class="btn-icon delete" onclick="remove(${b.id})"><img src="/assets/trash-2 (1).png" alt="excluir"></button>
            </div>
          </div>
          <h3 class="benefit-name">${b.nome}</h3>
          <p class="benefit-desc">${b.descricao || 'Sem descrição'}</p>
          <div class="benefit-stats">
            <span><strong>${b.beneficiarios}</strong> beneficiários</span>
            <span><strong>${formatCurrency(b.valorPadrao)}</strong>/mês</span>
          </div>
        </div>
      `).join('');
    }

    function openModal(id = null) {
      currentId = id;
      document.getElementById("form").reset();
      document.getElementById("modalTitle").textContent = id ? "Editar Benefício" : "Novo Benefício";
      if (id) {
        const item = benefits.find(b => b.id === id);
        if (item) Form.populate('form', item);
      }
      onNaturezaChange();
      Modal.open('modal');
      Mask.initAll();
    }

    function edit(id) { openModal(id); }

    function save() {
      const data = Form.serialize('form');
      if (!data.nome) { Toast.error('Nome é obrigatório'); return; }
      if (!data.natureza) { Toast.error('Natureza é obrigatória'); return; }

      if (currentId) {
        const idx = benefits.findIndex(b => b.id === currentId);
        if (idx > -1) benefits[idx] = { ...benefits[idx], ...data };
        Toast.success('Benefício atualizado!');
      } else {
        benefits.push({ id: Date.now(), ...data, beneficiarios: 0 });
        Toast.success('Benefício criado!');
      }
      Modal.close('modal');
      render();
    }

    function remove(id) {
      Confirm.show('Excluir este benefício?', () => {
        const idx = benefits.findIndex(b => b.id === id);
        if (idx > -1) benefits.splice(idx, 1);
        Toast.success('Benefício excluído!');
        render();
      });
    }

    function formatCurrency(val) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0); }
  </script>
</body>

</html>
