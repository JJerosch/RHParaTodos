<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Holerites')}"><title>Holerites</title></head>

<body>
<script th:inline="javascript">
    window.__CURRENT_USER__ = {
      email: /*[[${currentUser.email}]]*/ 'usuario@local',
      role:  /*[[${currentUser.role}]]*/ 'EMPLOYEE'
    };
</script>

  <aside th:replace="~{fragments/sidebar :: employee('payslips')}"></aside>

  <div class="main-content">
    <header th:replace="~{fragments/topbar :: topbar('Holerites Processados')}"></header>

    <div class="content-area">
      <div class="container">
        <div class="page-header">
          <div>
            <h2 class="page-title">Holerites Processados</h2>
            <div class="page-subtitle">Visualize e baixe seus holerites processados.</div>
          </div>
          <div class="page-actions">
            <div class="search-box" width="50">
              <input id="searchInput" type="search" placeholder="Pesquise aqui"/>
            </div>
            <button id="btnRefreshPayslips" class="btn btn-secondary">Atualizar</button>
          </div>
        </div>

        <div class="card table-container">
          <div class="table-header">
            <div class="table-title">Lista de Holerites</div>
            <div class="table-info">Total: <span id="totalCount">0</span></div>
          </div>

          <table class="data-table" id="payslipsTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Funcionário</th>
                <th>Mês/Ano</th>
                <th>Bruto</th>
                <th>Liquido</th>
                <th>Processado Em</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="payslipsTbody">
              <tr><td colspan="7">Carregando...</td></tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>
  </div>

  <div th:replace="~{fragments/scripts :: common}"></div>
  <script th:src="@{/scripts/payslips.js}"></script>
</body>

</html>
