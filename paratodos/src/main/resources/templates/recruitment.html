<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Recrutamento')}"><title>Recrutamento</title></head>

<body>
  <script th:inline="javascript">
    window.__CURRENT_USER__ = {
      email: /*[[${currentUser.email}]]*/ 'usuario@local',
      role:  /*[[${currentUser.role}]]*/ 'EMPLOYEE'
    };
  </script>

  <style>
    .kanban-board { display: flex; gap: var(--spacing-4); overflow-x: auto; padding-bottom: var(--spacing-4); }
    .kanban-column { min-width: 220px; flex: 1; background: var(--gray-100); border-radius: var(--radius-lg); padding: var(--spacing-4); }
    .kanban-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-4); padding-bottom: var(--spacing-3); border-bottom: 2px solid var(--gray-200); }
    .kanban-title { font-weight: 600; color: var(--gray-700); }
    .kanban-count { background: var(--gray-300); padding: 2px 8px; border-radius: 10px; font-size: var(--font-size-sm); }
    .kanban-cards { display: flex; flex-direction: column; gap: var(--spacing-3); min-height: 100px; }
    .candidate-card { background: white; border-radius: var(--radius-md); padding: var(--spacing-4); box-shadow: var(--shadow-sm); transition: all 0.2s; cursor: pointer; }
    .candidate-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .candidate-name { font-weight: 600; margin-bottom: var(--spacing-1); }
    .candidate-position { font-size: var(--font-size-sm); color: var(--gray-500); margin-bottom: var(--spacing-2); }
    .candidate-meta { display: flex; gap: var(--spacing-3); font-size: var(--font-size-xs); color: var(--gray-400); }
    .job-card { background: white; border-radius: var(--radius-lg); padding: var(--spacing-5); box-shadow: var(--shadow-sm); border: 1px solid var(--gray-200); }
    .job-header { display: flex; justify-content: space-between; margin-bottom: var(--spacing-3); }
    .job-title { font-size: var(--font-size-lg); font-weight: 600; }
    .job-meta { display: flex; gap: var(--spacing-4); font-size: var(--font-size-sm); color: var(--gray-500); margin-bottom: var(--spacing-3); }
    .job-stats { display: flex; gap: var(--spacing-6); padding-top: var(--spacing-3); border-top: 1px solid var(--gray-100); }
    .job-stat { text-align: center; }
    .job-stat-value { font-size: var(--font-size-xl); font-weight: 700; color: var(--primary-dark); }
    .job-stat-label { font-size: var(--font-size-xs); color: var(--gray-500); }
  </style>

  <aside th:replace="~{fragments/sidebar :: admin('recruitment')}"></aside>

  <div class="main-content">
    <header th:replace="~{fragments/topbar :: topbar('Recrutamento e Seleção')}"></header>

    <div class="content-area">
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-box-icon" style="background: rgba(44, 62, 80, 0.1);"><img th:src="@{/assets/file-text.png}" alt=""></div>
          <div class="stat-box-value" id="statVagas">0</div>
          <div class="stat-box-label">Total de Vagas</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-icon" style="background: rgba(39, 174, 96, 0.1);"><img th:src="@{/assets/check (1).png}" alt=""></div>
          <div class="stat-box-value" id="statAbertas">0</div>
          <div class="stat-box-label">Vagas Abertas</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-icon" style="background: rgba(243, 156, 18, 0.1);"><img th:src="@{/assets/id-card-lanyard (1).png}" alt=""></div>
          <div class="stat-box-value" id="statCandidatos">0</div>
          <div class="stat-box-label">Candidatos</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-icon" style="background: rgba(231, 76, 60, 0.1);"><img th:src="@{/assets/check (1).png}" alt=""></div>
          <div class="stat-box-value" id="statContratados">0</div>
          <div class="stat-box-label">Contratados</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs" style="margin-bottom: var(--spacing-6);">
        <button class="tab-btn active" onclick="showTab('vagas')">Vagas</button>
        <button class="tab-btn" onclick="showTab('candidatos')">Candidatos</button>
      </div>

      <!-- Tab Vagas -->
      <div id="tabVagas">
        <div class="page-header">
          <div>
            <h2 class="page-title">Vagas</h2>
            <p class="page-subtitle">Gerencie vagas com aprovação do Chefe de RH</p>
          </div>
          <button class="btn btn-primary" onclick="openJobModal()">+ Nova Vaga</button>
        </div>
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: var(--spacing-4);" id="jobsGrid"></div>
      </div>

      <!-- Tab Candidatos -->
      <div id="tabCandidatos" style="display: none;">
        <div class="page-header">
          <div>
            <h2 class="page-title">Candidatos por Vaga</h2>
            <p class="page-subtitle">Selecione uma vaga para ver os candidatos</p>
          </div>
          <button class="btn btn-primary" onclick="openCandidateModal()">+ Novo Candidato</button>
        </div>
        <div class="filters-bar">
          <div class="filter-group">
            <label>Vaga:</label>
            <select id="vagaFilter" onchange="loadCandidaturas()">
              <option value="">Selecione uma vaga</option>
            </select>
          </div>
        </div>
        <div class="kanban-board" id="kanbanBoard"></div>
      </div>
    </div>
  </div>

  <!-- Modal Nova Vaga -->
  <div class="modal" id="jobModal">
    <div class="modal-dialog modal-lg">
      <div class="modal-header">
        <h3 class="modal-title" id="jobModalTitle">Nova Vaga</h3>
        <button class="modal-close" onclick="Modal.close('jobModal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="jobForm">
          <input type="hidden" name="id">
          <div class="form-row form-row-2">
            <div class="form-group"><label class="form-label">Título da Vaga *</label><input type="text" class="form-input" name="titulo" required></div>
            <div class="form-group"><label class="form-label">Departamento</label><select class="form-select" name="departamentoId" id="jobDeptSelect"><option value="">Selecione</option></select></div>
          </div>
          <div class="form-row form-row-2">
            <div class="form-group"><label class="form-label">Cargo</label><select class="form-select" name="cargoId" id="jobCargoSelect"><option value="">Selecione</option></select></div>
            <div class="form-group"><label class="form-label">Quantidade</label><input type="number" class="form-input" name="quantidade" value="1" min="1"></div>
          </div>
          <div class="form-row form-row-3">
            <div class="form-group"><label class="form-label">Prioridade</label><select class="form-select" name="prioridade"><option value="BAIXA">Baixa</option><option value="MEDIA" selected>Média</option><option value="ALTA">Alta</option><option value="URGENTE">Urgente</option></select></div>
            <div class="form-group"><label class="form-label">Tipo Contrato</label><select class="form-select" name="tipoContrato"><option value="CLT">CLT</option><option value="PJ">PJ</option><option value="ESTAGIO">Estágio</option><option value="TEMPORARIO">Temporário</option></select></div>
            <div class="form-group"><label class="form-label">Modelo</label><select class="form-select" name="modeloTrabalho"><option value="PRESENCIAL">Presencial</option><option value="HIBRIDO">Híbrido</option><option value="REMOTO">Remoto</option></select></div>
          </div>
          <div class="form-row form-row-2">
            <div class="form-group"><label class="form-label">Salário Mínimo</label><input type="text" class="form-input" name="salarioMin" data-mask="currency"></div>
            <div class="form-group"><label class="form-label">Salário Máximo</label><input type="text" class="form-input" name="salarioMax" data-mask="currency"></div>
          </div>
          <div class="form-group"><label class="form-label">Descrição</label><textarea class="form-input" name="descricao" rows="3"></textarea></div>
          <div class="form-group"><label class="form-label">Requisitos</label><textarea class="form-input" name="requisitos" rows="3"></textarea></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('jobModal')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveJob()">Salvar como Rascunho</button>
      </div>
    </div>
  </div>

  <!-- Modal Novo Candidato -->
  <div class="modal" id="candidateModal">
    <div class="modal-dialog modal-md">
      <div class="modal-header">
        <h3 class="modal-title">Novo Candidato</h3>
        <button class="modal-close" onclick="Modal.close('candidateModal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="candidateForm">
          <div class="form-row form-row-2">
            <div class="form-group"><label class="form-label">Nome Completo *</label><input type="text" class="form-input" name="nomeCompleto" required></div>
            <div class="form-group"><label class="form-label">Email *</label><input type="email" class="form-input" name="email" required></div>
          </div>
          <div class="form-row form-row-2">
            <div class="form-group"><label class="form-label">Telefone</label><input type="text" class="form-input" name="telefone" data-mask="phone"></div>
            <div class="form-group"><label class="form-label">CPF</label><input type="text" class="form-input" name="cpf" data-mask="cpf"></div>
          </div>
          <div class="form-row form-row-2">
            <div class="form-group"><label class="form-label">Cidade</label><input type="text" class="form-input" name="cidade"></div>
            <div class="form-group"><label class="form-label">Estado</label><select class="form-select" name="estado"><option value="">Selecione</option><option value="SP">SP</option><option value="RJ">RJ</option><option value="MG">MG</option><option value="RS">RS</option><option value="PR">PR</option><option value="SC">SC</option><option value="BA">BA</option><option value="PE">PE</option><option value="CE">CE</option><option value="GO">GO</option><option value="DF">DF</option></select></div>
          </div>
          <div class="form-row form-row-2">
            <div class="form-group"><label class="form-label">Data de Nascimento</label><input type="date" class="form-input" name="dataNascimento"></div>
            <div class="form-group"><label class="form-label">Pretensão Salarial</label><input type="text" class="form-input" name="pretensaoSalarial" data-mask="currency"></div>
          </div>
          <div class="form-group"><label class="form-label">Observações</label><textarea class="form-input" name="observacoes" rows="2"></textarea></div>
          <div class="form-group">
            <label class="form-label">Vincular à Vaga</label>
            <select class="form-select" name="vagaId" id="candidateVagaSelect"><option value="">Selecione (opcional)</option></select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('candidateModal')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveCandidato()">Cadastrar</button>
      </div>
    </div>
  </div>

  <div th:replace="~{fragments/scripts :: common}"></div>
  <script>
    const VAPI = '/api/recruitment';
    let vagas = [];
    let candidaturas = [];
    const role = window.__CURRENT_USER__.role;
    const isChefe = role === 'RH_CHEFE' || role === 'ADMIN';

    const statusLabels = { RASCUNHO: 'Rascunho', ABERTA: 'Aberta', EM_ANDAMENTO: 'Em Andamento', PAUSADA: 'Pausada', ENCERRADA: 'Encerrada', CANCELADA: 'Cancelada' };
    const statusBadge = { RASCUNHO: 'badge-info', ABERTA: 'badge-success', EM_ANDAMENTO: 'badge-warning', PAUSADA: 'badge-warning', ENCERRADA: 'badge-danger', CANCELADA: 'badge-danger' };
    const modeloLabels = { PRESENCIAL: 'Presencial', HIBRIDO: 'Híbrido', REMOTO: 'Remoto' };
    const etapaLabels = { TRIAGEM: 'Triagem', ENTREVISTA_RH: 'Entrevista RH', TESTE_TECNICO: 'Teste Técnico', ENTREVISTA_GESTOR: 'Entrevista Gestor', PROPOSTA: 'Proposta', CONTRATADO: 'Contratado', REJEITADO: 'Rejeitado', DESISTIU: 'Desistiu' };

    async function api(url, opts = {}) {
      const res = await fetch(url, { credentials: 'same-origin', headers: { 'Content-Type': 'application/json', ...opts.headers }, ...opts });
      if (res.status === 401) { window.location.href = '/login'; return; }
      if (res.status === 204) return null;
      const body = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(body.error || 'Erro na requisição');
      return body;
    }

    document.addEventListener("DOMContentLoaded", async () => {
      if (!Auth.requireAuth()) return;
      initUserMenu();
      initSidebar();
      Auth.applyRoleVisibility(document);
      Auth.applyActionVisibility(document);
      Mask.initAll();
      await Promise.all([loadDropdowns(), loadVagas(), loadStats()]);
    });

    async function loadDropdowns() {
      try {
        const [depts, cargos] = await Promise.all([
          api('/api/employees/departamentos'),
          api('/api/employees/cargos')
        ]);
        const jobDept = document.getElementById("jobDeptSelect");
        const jobCargo = document.getElementById("jobCargoSelect");
        (depts || []).forEach(d => { jobDept.innerHTML += '<option value="' + d.id + '">' + d.nome + '</option>'; });
        (cargos || []).forEach(c => { jobCargo.innerHTML += '<option value="' + c.id + '">' + c.titulo + '</option>'; });
      } catch (e) { console.error('Erro dropdowns:', e); }
    }

    async function loadStats() {
      try {
        const stats = await api(VAPI + '/stats');
        if (stats) {
          document.getElementById("statVagas").textContent = stats.totalVagas;
          document.getElementById("statAbertas").textContent = stats.vagasAbertas;
          document.getElementById("statCandidatos").textContent = stats.totalCandidatos;
          document.getElementById("statContratados").textContent = stats.contratados;
        }
      } catch (e) { console.error('Erro stats:', e); }
    }

    async function loadVagas() {
      try {
        vagas = await api(VAPI + '/vagas') || [];
      } catch (e) { console.error('Erro vagas:', e); vagas = []; }
      renderJobs();
      populateVagaSelects();
    }

    function populateVagaSelects() {
      const vagaFilter = document.getElementById("vagaFilter");
      const candidateVaga = document.getElementById("candidateVagaSelect");
      vagaFilter.innerHTML = '<option value="">Selecione uma vaga</option>';
      candidateVaga.innerHTML = '<option value="">Selecione (opcional)</option>';
      vagas.filter(v => v.status === 'ABERTA' || v.status === 'EM_ANDAMENTO').forEach(v => {
        vagaFilter.innerHTML += '<option value="' + v.id + '">' + v.titulo + '</option>';
        candidateVaga.innerHTML += '<option value="' + v.id + '">' + v.titulo + '</option>';
      });
    }

    function formatCurrency(val) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0); }

    function renderJobs() {
      const grid = document.getElementById("jobsGrid");
      if (vagas.length === 0) {
        grid.innerHTML = '<div class="empty-state"><h3 class="empty-state-title">Nenhuma vaga cadastrada</h3></div>';
        return;
      }
      grid.innerHTML = vagas.map(j => `
        <div class="job-card">
          <div class="job-header">
            <h3 class="job-title">${j.titulo}</h3>
            <div class="cell-actions">
              ${j.status === 'RASCUNHO' && isChefe ? '<button class="btn-icon" onclick="approveVaga(' + j.id + ')" title="Aprovar"><img src="/assets/check (1).png" alt="aprovar" width="16" height="16"></button>' : ''}
              <button class="btn-icon edit" onclick="editJob(${j.id})"><img src="/assets/pencil (1).png" alt="editar"></button>
            </div>
          </div>
          <div class="job-meta">
            <span>${j.departamentoNome || '-'}</span>
            <span>${modeloLabels[j.modeloTrabalho] || j.modeloTrabalho}</span>
            <span>${j.quantidade} vaga(s)</span>
          </div>
          <span class="badge ${statusBadge[j.status] || 'badge-info'}">${statusLabels[j.status] || j.status}</span>
          ${j.salarioMin || j.salarioMax ? '<p style="margin-top: var(--spacing-2); font-size: var(--font-size-sm); color: var(--gray-500);">' + formatCurrency(j.salarioMin) + ' - ' + formatCurrency(j.salarioMax) + '</p>' : ''}
        </div>
      `).join('');
    }

    async function loadCandidaturas() {
      const vagaId = document.getElementById("vagaFilter").value;
      if (!vagaId) { document.getElementById("kanbanBoard").innerHTML = ''; return; }
      try {
        candidaturas = await api(VAPI + '/vagas/' + vagaId + '/candidaturas') || [];
      } catch (e) { console.error('Erro candidaturas:', e); candidaturas = []; }
      renderKanban();
    }

    function renderKanban() {
      const stages = [
        { key: 'TRIAGEM', title: 'Triagem', color: 'var(--gray-500)' },
        { key: 'ENTREVISTA_RH', title: 'Entrevista RH', color: 'var(--warning-orange)' },
        { key: 'TESTE_TECNICO', title: 'Teste Técnico', color: 'var(--info-gray)' },
        { key: 'ENTREVISTA_GESTOR', title: 'Entrevista Gestor', color: 'var(--primary-dark)' },
        { key: 'PROPOSTA', title: 'Proposta', color: '#8e44ad' },
        { key: 'CONTRATADO', title: 'Contratado', color: 'var(--success-green)' },
        { key: 'REJEITADO', title: 'Rejeitado', color: 'var(--error-red)' }
      ];

      document.getElementById("kanbanBoard").innerHTML = stages.map(s => {
        const cards = candidaturas.filter(c => c.etapa === s.key);
        return `<div class="kanban-column">
          <div class="kanban-header">
            <span class="kanban-title" style="border-left: 3px solid ${s.color}; padding-left: 8px;">${s.title}</span>
            <span class="kanban-count">${cards.length}</span>
          </div>
          <div class="kanban-cards">
            ${cards.map(c => `<div class="candidate-card" onclick="moveCandidatura(${c.id}, '${s.key}')">
              <div class="candidate-name">${c.candidatoNome}</div>
              <div class="candidate-position">${c.candidatoEmail || ''}</div>
              <div class="candidate-meta"><span>${c.candidatoTelefone || ''}</span></div>
            </div>`).join('')}
          </div>
        </div>`;
      }).join('');
    }

    async function moveCandidatura(id, currentEtapa) {
      const etapas = ['TRIAGEM', 'ENTREVISTA_RH', 'TESTE_TECNICO', 'ENTREVISTA_GESTOR', 'PROPOSTA', 'CONTRATADO'];
      const currentIndex = etapas.indexOf(currentEtapa);
      const options = etapas.filter((e, i) => i !== currentIndex).concat(['REJEITADO']);

      const selected = prompt('Mover para qual etapa?\\n' + options.map((e, i) => (i + 1) + '. ' + (etapaLabels[e] || e)).join('\\n') + '\\n\\nDigite o número:');
      if (!selected) return;
      const idx = parseInt(selected) - 1;
      if (idx < 0 || idx >= options.length) return;

      const novaEtapa = options[idx];
      try {
        await api(VAPI + '/candidaturas/' + id + '/etapa', {
          method: 'PUT',
          body: JSON.stringify({ etapa: novaEtapa })
        });
        Toast.success('Candidato movido para ' + (etapaLabels[novaEtapa] || novaEtapa));
        if (novaEtapa === 'CONTRATADO') {
          Toast.success('Funcionário criado! Aguardando promoção para atribuição de departamento/cargo.');
        }
        loadCandidaturas();
        loadStats();
      } catch (e) { Toast.error(e.message || 'Erro ao mover candidato'); }
    }

    function showTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', ['vagas', 'candidatos'][i] === tab));
      document.getElementById('tabVagas').style.display = tab === 'vagas' ? 'block' : 'none';
      document.getElementById('tabCandidatos').style.display = tab === 'candidatos' ? 'block' : 'none';
    }

    function openJobModal(id = null) {
      document.getElementById('jobForm').reset();
      document.getElementById("jobModalTitle").textContent = id ? 'Editar Vaga' : 'Nova Vaga';
      if (id) {
        const v = vagas.find(j => j.id === id);
        if (v) Form.populate('jobForm', v);
      }
      Modal.open('jobModal');
      Mask.initAll();
    }

    function editJob(id) { openJobModal(id); }

    async function saveJob() {
      const form = document.getElementById("jobForm");
      if (!form.checkValidity()) { form.reportValidity(); return; }
      const fd = Form.serialize('jobForm');

      const body = {
        titulo: fd.titulo,
        descricao: fd.descricao || null,
        departamentoId: fd.departamentoId ? Number(fd.departamentoId) : null,
        cargoId: fd.cargoId ? Number(fd.cargoId) : null,
        quantidade: fd.quantidade ? Number(fd.quantidade) : 1,
        prioridade: fd.prioridade || 'MEDIA',
        salarioMin: fd.salarioMin ? parseFloat(String(fd.salarioMin).replace(/[^\d,]/g, '').replace(',', '.')) : null,
        salarioMax: fd.salarioMax ? parseFloat(String(fd.salarioMax).replace(/[^\d,]/g, '').replace(',', '.')) : null,
        tipoContrato: fd.tipoContrato || 'CLT',
        modeloTrabalho: fd.modeloTrabalho || 'PRESENCIAL',
        requisitos: fd.requisitos || null,
        status: 'RASCUNHO'
      };

      try {
        const id = fd.id;
        if (id) {
          await api(VAPI + '/vagas/' + id, { method: 'PUT', body: JSON.stringify(body) });
          Toast.success('Vaga atualizada!');
        } else {
          await api(VAPI + '/vagas', { method: 'POST', body: JSON.stringify(body) });
          Toast.success('Vaga criada como rascunho! Aguardando aprovação do Chefe de RH.');
        }
        Modal.close('jobModal');
        loadVagas();
        loadStats();
      } catch (e) { Toast.error(e.message || 'Erro ao salvar vaga'); }
    }

    async function approveVaga(id) {
      try {
        await api(VAPI + '/vagas/' + id + '/approve', { method: 'PUT' });
        Toast.success('Vaga aprovada e publicada!');
        loadVagas();
        loadStats();
      } catch (e) { Toast.error(e.message || 'Erro ao aprovar vaga'); }
    }

    function openCandidateModal() {
      document.getElementById('candidateForm').reset();
      Modal.open('candidateModal');
      Mask.initAll();
    }

    async function saveCandidato() {
      const form = document.getElementById("candidateForm");
      if (!form.checkValidity()) { form.reportValidity(); return; }
      const fd = Form.serialize('candidateForm');

      const candidatoBody = {
        nomeCompleto: fd.nomeCompleto,
        email: fd.email,
        telefone: fd.telefone || null,
        cpf: fd.cpf ? fd.cpf.replace(/\D/g, '') : null,
        dataNascimento: fd.dataNascimento || null,
        cidade: fd.cidade || null,
        estado: fd.estado || null,
        pretensaoSalarial: fd.pretensaoSalarial ? parseFloat(String(fd.pretensaoSalarial).replace(/[^\d,]/g, '').replace(',', '.')) : null,
        observacoes: fd.observacoes || null
      };

      try {
        const candidato = await api(VAPI + '/candidatos', { method: 'POST', body: JSON.stringify(candidatoBody) });
        Toast.success('Candidato cadastrado!');

        // Se vincular a uma vaga, cria candidatura
        if (fd.vagaId && candidato) {
          await api(VAPI + '/candidaturas', {
            method: 'POST',
            body: JSON.stringify({ vagaId: Number(fd.vagaId), candidatoId: candidato.id })
          });
          Toast.success('Candidato vinculado à vaga!');
        }

        Modal.close('candidateModal');
        loadStats();
        loadCandidaturas();
      } catch (e) { Toast.error(e.message || 'Erro ao cadastrar candidato'); }
    }
  </script>
</body>

</html>
