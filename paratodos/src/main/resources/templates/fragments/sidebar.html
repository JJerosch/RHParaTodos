<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
  ============================================================
  FRAGMENT: Sidebar (Menu Lateral)
  Uso nos templates:
    Admin:      th:replace="~{fragments/sidebar :: admin('dashboard')}"
    Employee:   th:replace="~{fragments/sidebar :: employee('employee-dashboard')}"
  O parâmetro é o nome da página ativa (sem .html).
  ============================================================
-->
<body>

<!-- ==================== SIDEBAR ADMIN ==================== -->
<aside th:fragment="admin(activePage)" class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="logo">
            <img th:src="@{/assets/gruporhpaint.png}" alt="logo_menu_lateral" height="60">
        </div>
    </div>

    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}" class="nav-item"
           th:classappend="${activePage == 'dashboard'} ? ' active'"
           data-roles="ADMIN,RH_CHEFE,RH_ASSISTENTE,DP_CHEFE,DP_ASSISTENTE">
            <span class="nav-icon"><img th:src="@{/assets/chart-column (1).png}" alt="" width="20" height="20"></span>
            <span class="nav-text">Dashboard</span>
        </a>

        <!-- Departamentos (seção principal com subáreas) -->
        <a th:href="@{/departments}" class="nav-item"
           th:classappend="${activePage == 'departments'} ? ' active'"
           data-roles="ADMIN,RH_CHEFE">
            <span class="nav-icon"><img th:src="@{/assets/building-2.png}" alt="" width="20" height="20"></span>
            <span class="nav-text">Estrutura</span>
        </a>
        <a th:href="@{/employees}" class="nav-item"
           th:classappend="${activePage == 'employees'} ? ' active'"
           data-roles="ADMIN,RH_CHEFE,RH_ASSISTENTE,DP_CHEFE,DP_ASSISTENTE">
            <span class="nav-icon"><img th:src="@{/assets/id-card-lanyard (1).png}" alt="" width="20" height="20"></span>
            <span class="nav-text">Funcionários</span>
        </a>
        <a th:href="@{/positions}" class="nav-item"
           th:classappend="${activePage == 'positions'} ? ' active'"
           data-roles="ADMIN,RH_CHEFE,RH_ASSISTENTE,DP_CHEFE,DP_ASSISTENTE">
            <span class="nav-icon"><img th:src="@{/assets/scroll.png}" alt="" width="20" height="20"></span>
            <span class="nav-text">Cargos</span>
        </a>
        <a th:href="@{/solicitacoes}" class="nav-item"
           th:classappend="${activePage == 'solicitacoes'} ? ' active'"
           data-roles="ADMIN,RH_CHEFE">
            <span class="nav-icon"><img th:src="@{/assets/check (1).png}" alt="" width="20" height="20"></span>
            <span class="nav-text">Solicitações</span>
        </a>

        <!-- Recursos Humanos -->
        <a th:href="@{/recruitment}" class="nav-item"
           th:classappend="${activePage == 'recruitment'} ? ' active'"
           data-roles="ADMIN,RH_CHEFE,RH_ASSISTENTE">
            <span class="nav-icon"><img th:src="@{/assets/search.png}" alt="" width="20" height="20"></span>
            <span class="nav-text">Recrutamento</span>
        </a>

        <!-- Departamento Pessoal -->
        <a th:href="@{/vacation}" class="nav-item"
           th:classappend="${activePage == 'vacation'} ? ' active'"
           data-roles="ADMIN,RH_CHEFE,DP_CHEFE,DP_ASSISTENTE">
            <span class="nav-icon"><img th:src="@{/assets/tree-palm (1).png}" alt="" width="20" height="20"></span>
            <span class="nav-text">Férias</span>
        </a>
        <a th:href="@{/benefits}" class="nav-item"
           th:classappend="${activePage == 'benefits'} ? ' active'"
           data-roles="ADMIN,RH_CHEFE,DP_CHEFE,DP_ASSISTENTE">
            <span class="nav-icon"><img th:src="@{/assets/gift (2).png}" alt="" width="20" height="20"></span>
            <span class="nav-text">Benefícios</span>
        </a>
        <a th:href="@{/timesheet}" class="nav-item"
           th:classappend="${activePage == 'timesheet'} ? ' active'"
           data-roles="ADMIN,RH_CHEFE,RH_ASSISTENTE,DP_CHEFE,DP_ASSISTENTE">
            <span class="nav-icon"><img th:src="@{/assets/hourglass.png}" alt="" width="20" height="20"></span>
            <span class="nav-text">Ponto</span>
        </a>
        <a th:href="@{/admin/ponto-calendario}" class="nav-item"
           th:classappend="${activePage == 'ponto-calendario'} ? ' active'"
           data-roles="ADMIN">
            <span class="nav-icon"><img th:src="@{/assets/calendar.png}" alt="" width="20" height="20"></span>
            <span class="nav-text">Calendário do Ponto</span>
        </a>
        <!-- Minha Área (Individual) -->
        <div class="nav-section" data-roles="ADMIN,RH_CHEFE,RH_ASSISTENTE,DP_CHEFE,DP_ASSISTENTE,EMPLOYEE">Minha Área</div>
        <a th:href="@{/meu-ponto}" class="nav-item"
           th:classappend="${activePage == 'meu-ponto'} ? ' active'"
           data-roles="ADMIN,RH_CHEFE,RH_ASSISTENTE,DP_CHEFE,DP_ASSISTENTE,EMPLOYEE">
            <span class="nav-icon"><img th:src="@{/assets/hourglass.png}" alt="" width="20" height="20"></span>
            <span class="nav-text">Meu Ponto</span>
        </a>
        <a th:href="@{/meu-perfil}" class="nav-item"
           th:classappend="${activePage == 'meu-perfil'} ? ' active'"
           data-roles="ADMIN,RH_CHEFE,RH_ASSISTENTE,DP_CHEFE,DP_ASSISTENTE,EMPLOYEE">
            <span class="nav-icon"><img th:src="@{/assets/hourglass.png}" alt="" width="20" height="20"></span>
            <span class="nav-text">Meu Perfil</span>
        </a>
    </nav>
</aside>


<!-- ==================== SIDEBAR EMPLOYEE ==================== -->
<aside th:fragment="employee(activePage)" class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="logo">
            <img th:src="@{/assets/gruporhpaint.png}" alt="logo_menu_lateral" height="60">
        </div>
    </div>

    <nav class="sidebar-nav">
        <a th:href="@{/employee-dashboard}" class="nav-item"
           th:classappend="${activePage == 'employee-dashboard'} ? ' active'">
            <span class="nav-icon"><img th:src="@{/assets/hourglass.png}" alt="" width="20" height="20"></span>
            <span class="nav-text">Ponto</span>
        </a>
        <a th:href="@{/meu-perfil}" class="nav-item"
           th:classappend="${activePage == 'meu-perfil'} ? ' active'"
           data-roles="ADMIN,RH_CHEFE,RH_ASSISTENTE,DP_CHEFE,DP_ASSISTENTE,EMPLOYEE">
            <span class="nav-icon"><img th:src="@{/assets/hourglass.png}" alt="" width="20" height="20"></span>
            <span class="nav-text">Meu Perfil</span>
        </a>
    </nav>
</aside>

</body>
</html>
